          renderer.domElement.removeEventListener("click", handleMouseClick);
          if (containerRef.current && renderer.domElement) containerRef.current.removeChild(renderer.domElement);
          bGeom.dispose(); sGeom.dispose(); bMat.dispose(); connGeom.dispose(); connMat.dispose(); renderer.dispose();

        const lSpot = new THREE.DirectionalLight(0xff00ff, 2.5); lSpot.position.set(-15, 10, 10); scene.add(lSpot);
        const rSpot = new THREE.DirectionalLight(0x00ffff, 2.5); rSpot.position.set(15, 10, 10); scene.add(rSpot);
        const whiteLight = new THREE.PointLight(0xffffff, 1.2, 50); whiteLight.position.set(0, 10, -5); scene.add(whiteLight);

        const leftHemisphere = new THREE.Group(); leftHRef.current = leftHemisphere; scene.add(leftHemisphere);
        const rightHemisphere = new THREE.Group(); rightHRef.current = rightHemisphere; scene.add(rightHemisphere);

        const genHemisphere = (isLeft) => {
          const geom = new THREE.BufferGeometry();
          const verts = []; const cols = [];
          const mainCol = isLeft ? new THREE.Color(0xff00aa) : new THREE.Color(0x00ffcc);
          const secCol = isLeft ? new THREE.Color(0xff66cc) : new THREE.Color(0x33ffff);

          for (let i = 0; i <= 35; i++) {
            const u = (i / 35) * Math.PI;
            for (let j = 0; j <= 35; j++) {
              const v = (j / 35) * Math.PI;
              const fV = isLeft ? v + Math.PI / 2 : v - Math.PI / 2;
              let x = 8 * Math.sin(u) * Math.cos(fV);
              let y = 9 * Math.cos(u);
              let z = 6 * Math.sin(u) * Math.sin(fV);

              const fold = 1.0 + 0.45 * (Math.sin(x * 12) * Math.cos(y * 12) * Math.sin(z * 12));
              verts.push(x * fold, y * fold, z * fold);
              const mix = (y + 9) / 18;
              const c = mainCol.clone().lerp(secCol, mix);
              cols.push(c.r, c.g, c.b);
            }
          }
          geom.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
          geom.setAttribute("color", new THREE.Float32BufferAttribute(cols, 3));
          return geom;
        };

        const bMat = new THREE.PointsMaterial({ size: 0.22, vertexColors: true, transparent: true, opacity: xrayMode ? 0.45 : 0.95 });
        leftHemisphere.add(new THREE.Points(genHemisphere(true), bMat));
        rightHemisphere.add(new THREE.Points(genHemisphere(false), bMat));

        let animFrameId;
        const clock = new THREE.Clock();
        const animate = () => {
          animFrameId = requestAnimationFrame(animate);
          const elapsed = clock.getElapsedTime();
          let speed = elapsed * (activeState === "emergencia" ? 1.8 : 0.25);

          const split = explodedMode ? 3.5 : 0;
          leftHemisphere.position.x = THREE.MathUtils.lerp(leftHemisphere.position.x, -split, 0.1);
          rightHemisphere.position.x = THREE.MathUtils.lerp(rightHemisphere.position.x, split, 0.1);

          leftHemisphere.rotation.y = speed * 0.06;
          rightHemisphere.rotation.y = speed * 0.06;

          if (activeIncident) {
            whiteLight.color.setHex(activeIncident === "frustracion_critica" ? 0xff0055 : 0x00f0ff);
            whiteLight.intensity = 2.5 + 1.5 * Math.sin(elapsed * 15);
          } else {
            whiteLight.color.setHex(0xffffff); whiteLight.intensity = 0.8;
          }

          if (!explodedMode) {
            camera.position.x = 28 * Math.sin(elapsed * 0.08);
            camera.position.z = 28 * Math.cos(elapsed * 0.08);
            camera.lookAt(0, 0, 0);
          } else {
            camera.position.set(0, 4, 25); camera.lookAt(0, 0, 0);
          }
          if (controls) controls.update();
          renderer.render(scene, camera);
        };
        animate();

        return () => {
          cancelAnimationFrame(animFrameId);
          if (containerRef.current && renderer.domElement) containerRef.current.removeChild(renderer.domElement);
          renderer.dispose();
        };
      }, [activeState, activeIncident, xrayMode, explodedMode]);

      return (
        <div className="relative w-full h-full min-h-[350px] bg-slate-950/40 rounded-xl border border-slate-800/80 overflow-hidden">

              <span>HEMISFERIO EMOCIONAL: ACTIVE</span>
            </div>
            <div>RENDER_MODE: WebGL / Procedural Brain 3D</div>
          </div>
        </div>
      );
    }

    function AINodeNetwork({ activeState, activeIncidentId, dict }) {
      const canvasRef = useRef(null);

      const [selectedNode, setSelectedNode] = useState(null);

      useEffect(() => {
        if (activeIncidentId) {
          setNodes(prev => prev.map(n => ({ ...n, status: n.type === "input" ? "processing" : "idle", activationPulse: n.type === "input" ? 1 : 0 })));
          const t1 = setTimeout(() => {
            setNodes(prev => prev.map(n => ({ ...n, status: n.type === "process" ? "processing" : (n.type === "input" ? "active" : n.status), activationPulse: n.type === "process" ? 1 : n.activationPulse })));
          }, 700);
          const t2 = setTimeout(() => {
            setNodes(prev => prev.map(n => ({ ...n, status: n.type === "decision" ? "processing" : (n.type === "process" ? "active" : n.status), activationPulse: n.type === "decision" ? 1 : n.activationPulse })));
          }, 1400);
          const t3 = setTimeout(() => {
            setNodes(prev => prev.map(n => ({ ...n, status: n.type === "output" ? "active" : (n.type === "decision" ? "active" : n.status), activationPulse: n.type === "output" ? 1 : n.activationPulse })));
          }, 2100);
          return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
        } else {
          setNodes(initialAINodes.map(n => ({ ...n, status: "idle", activationPulse: 0 })));
        }
      }, [activeIncidentId]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current; if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const y = ((e.clientY - rect.top) / rect.height) * canvas.height;

        let clicked = null;
        nodes.forEach(n => {
          const nx = (n.x / 100) * canvas.width; const ny = (n.y / 100) * canvas.height;
          if (Math.hypot(x - nx, y - ny) < 22) clicked = n;
        });
        if (clicked) setSelectedNode(clicked);
      };

      useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return;

          for (let j = 0; j < canvas.height; j += 40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke(); }

          links.forEach(l => {

              const tx = (tn.x / 100) * canvas.width; const ty = (tn.y / 100) * canvas.height;
              ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(tx, ty);
              ctx.strokeStyle = (activeState === "ia" || activeIncidentId) ? "#00ffff" : "#475569";
              ctx.lineWidth = (activeState === "ia" || activeIncidentId) ? 2.0 : 1.0;
              ctx.stroke();

            ctx.fillStyle = "#cbd5e1"; ctx.font = "9px monospace"; ctx.fillText(n.label, nx, ny + 24);

                const py = ly + radius * 0.5 * Math.sin(angle);

                if (i === 0) {
                  ctx.moveTo(px, py);
                } else {
                  ctx.lineTo(px, py);
                }
              }

              ctx.strokeStyle = layer % 2 === 0 ? "#ff00ff" : "#00ffff";
              ctx.lineWidth = 1.5;
              ctx.stroke();
            }

            // Rejilla holográfica de base
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(0, 240, 255, 0.4)";
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            for (let g = -4; g <= 4; g++) {
              ctx.moveTo(cx - 80, cy + g * 10);
              ctx.lineTo(cx + 80, cy + g * 10);
              ctx.moveTo(cx + g * 20, cy - 40);
              ctx.lineTo(cx + g * 20, cy + 40);
            }
            ctx.stroke();

            // Impulso de transmisión de datos activo
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(cx + 20 * Math.sin(phase), cy + 10 * Math.cos(phase), 5, 0, Math.PI * 2);
            ctx.fill();
          }

          animId = requestAnimationFrame(draw);
        };

        draw();
        return () => cancelAnimationFrame(animId);
      }, [arPlaced, scale, rotation]);

      return (
        <div className="w-full h-full bg-slate-950/80 border border-slate-800 rounded-xl p-4 flex flex-col space-y-4 backdrop-blur-md">
          <div className="flex items-center justify-between border-b border-slate-800 pb-2">

          <div className="relative flex-1 min-h-[250px] bg-slate-900 border border-slate-800 rounded-lg overflow-hidden flex flex-col items-center justify-center">

                <div className="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:1.5rem_1.5rem] opacity-35" />

                </span>

            <canvas ref={canvasRef} width={450} height={260} className="absolute inset-0 w-full h-full block z-10 pointer-events-none" />

            <div className="absolute top-3 left-3 z-20 font-mono text-[9px] bg-slate-950/90 py-1.5 px-2.5 rounded border border-slate-800 text-slate-300 space-y-0.5 backdrop-blur-sm">
              <div>TRACKING: <span className="text-cyan-400 font-bold">{status}</span></div>
              <div>ANCHOR_POINT: {arPlaced ? "ANCHORED (MESA_01)" : "NOT_PLACED"}</div>

            {!arPlaced && (

          <div className="grid grid-cols-3 gap-2">

              <Icon name="rotate" /> Rotar 15°
            </button>
            <button onClick={() => setScale(s => Math.min(s + 0.1, 2.0))} disabled={!arPlaced} className="bg-slate-900/60 hover:bg-slate-800 border border-slate-800 text-slate-300 py-2 px-3 rounded text-[10px] flex items-center justify-center gap-1.5 disabled:opacity-40">
              <Icon name="scale" /> Agrandar

            <button onClick={() => { setArPlaced(false); setStatus("BUSCANDO SUPERFICIE DE NUEVO..."); }} disabled={!arPlaced} className="bg-slate-900/60 hover:bg-slate-800 border border-slate-800 text-slate-300 py-2 px-3 rounded text-[10px] flex items-center justify-center gap-1.5 disabled:opacity-40">
              <Icon name="move" /> Re-ubicar
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState("es");
      const dict = translations[lang];

      const [activeState, setActiveState] = useState("operacion");
      const [viewportMode, setViewportMode] = useState("map");
      const [xrayMode, setXrayMode] = useState(false);

      const [nodes, setNodes] = useState(initialNodes);

      const [formLocationId, setFormLocationId] = useState("node_soyapango");

      const [timeStr, setTimeStr] = useState("");

      useEffect(() => {
        const timer = setInterval(() => {
          setTimeStr(new Date().toLocaleTimeString());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const elapsedTimer = setInterval(() => {
          setIncidents(prev => prev.map(inc => {
            if (inc.status === "en_ejecucion" || inc.status === "aceptado") {
              return { ...inc, elapsedSeconds: inc.elapsedSeconds + 1 };
            }
            return inc;
          }));
        }, 1000);
        return () => clearInterval(elapsedTimer);
      }, []);

      const getMetrics = () => {
        const avgIft = Math.round(nodes.reduce((sum, n) => sum + n.ift, 0) / nodes.length);
        const avgNec = Math.round(nodes.reduce((sum, n) => sum + n.nec, 0) / nodes.length);
        const csd = Math.round(nodes.reduce((sum, n) => sum + n.connectivity, 0) / nodes.length);
        return { avgIft, avgNec, csd };
      };
      const metrics = getMetrics();

      const handleSimulateReport = (e) => {
        e.preventDefault();
        const targetNode = nodes.find(n => n.id === formLocationId);
        if (!targetNode) return;

        const newId = "inc_" + (Math.floor(Math.random() * 900) + 100);
        const hash = "0000" + Array.from({ length: 48 }, () => Math.floor(Math.random() * 16).toString(16)).join("");

        const newIncident = {
          id: newId,
          title: dict.emotions[formEmotion].split(" (")[0] + " en " + targetNode.name,
          emotion: formEmotion,
          severity: formSeverity,
          location: targetNode.name,
          description: formDescription || "Alerta de resiliencia comunitaria.",
          slaMinutes: formEmotion === "frustracion_critica" ? 30 : 10080,
          elapsedSeconds: 0,
          status: "abierto",
          assignedTo: formEmotion === "frustracion_critica" ? "Brigada Local" : "Comité de Obras",
          budgetUSD: 1500,
          timestamp: new Date().toISOString(),
          hash: hash,
          coordinates: targetNode.coords
        };

        setProcessingIncidentId(newId);
        setIncidents(prev => [newIncident, ...prev]);

        setNodes(prev => prev.map(n => {
          if (n.id === formLocationId) {
            return {
              ...n,
              ift: formEmotion === "frustracion_critica" ? Math.min(n.ift + 15, 100) : Math.max(n.ift - 5, 0),
              nec: formEmotion === "esperanza_activa" ? Math.min(n.nec + 18, 100) : n.nec,
              activeIncidents: n.activeIncidents + 1
            };
          }
          return n;
        }));

        const newBlock = {
          index: blockchain.length + 1,
          timestamp: new Date().toISOString(),
          incidentId: newId,
          action: "INGESTA_EVENTO (" + dict.emotions[formEmotion].split(" (")[0] + ")",
          hash: hash,
          prevHash: blockchain[blockchain.length - 1].hash,
          validator: "Consensus_Node_" + targetNode.name.split(" ")[0]
        };
        setBlockchain(prev => [...prev, newBlock]);
        setFormDescription("");

        setTimeout(() => {
          setIncidents(prev => prev.map(i => i.id === newId ? { ...i, status: "aceptado" } : i));
          setProcessingIncidentId(null);

        if (inc) {
          const block = {
            index: blockchain.length + 1,
            timestamp: new Date().toISOString(),
            incidentId: id,
            action: "VALIDACIÓN_CIERRE_OPERATIVO",
            hash: "0000" + Array.from({ length: 48 }, () => Math.floor(Math.random() * 16).toString(16)).join(""),

            validator: "Sovereign_Comunidad_Node"

            if (n.name === inc.location) {

                    <button onClick={() => setViewportMode("map")} className={"flex items-center gap-1.5 font-mono text-[10px] font-bold px-3 py-1.5 rounded " + (viewportMode === "map" ? "bg-slate-800 text-cyan-400" : "text-slate-400")}>

                    <Icon name="send" className="w-3.5 h-3.5" />
                    {dict.submitReport}
                  </button>
                </form>
              </div>

              <div className="bg-slate-950 border border-slate-800 rounded-xl p-5 space-y-4 flex-1">
                <h3 className="font-mono text-xs text-slate-300 font-bold border-b border-slate-900 pb-2 uppercase flex items-center justify-between">
                  <span>{dict.activeIncidents}</span>
                  <Icon name="alert" className="w-4 h-4 text-yellow-500" />
                </h3>
                <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                  {incidents.length === 0 ? (
                    <div className="text-center font-mono text-xs text-slate-500 py-6">{dict.noIncidents}</div>
                  ) : (
                    incidents.map(inc => (
                      <div key={inc.id} className="p-3 bg-slate-900/60 border border-slate-850 rounded font-mono text-[11px] space-y-2">
                        <div className="flex justify-between items-center">
                          <span className="text-white font-bold">{inc.id}</span>
                          <span className="px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-slate-800 text-cyan-400">
                            {dict.emotions[inc.emotion].split(" (")[0]}
                          </span>
                        </div>
                        <div>
                          <h4 className="text-slate-200 font-semibold text-xs leading-snug">{inc.title}</h4>
                          <p className="text-[10px] text-slate-400 mt-1">{inc.description}</p>
                        </div>
                        <div className="flex justify-between items-center text-[10px] text-slate-500 pt-1 border-t border-slate-800">
                          <span>{inc.location}</span>
                          <span>{inc.assignedTo}</span>
                        </div>
                        <div className="flex items-center justify-between text-[10px] pt-1">
                          <span className="text-yellow-500 font-bold">SLA ACTIVE</span>
                          {inc.status !== "validado" ? (
                            <button onClick={() => handleValidateIncident(inc.id)} className="bg-emerald-500 text-slate-950 font-bold px-2 py-1 rounded text-[9px] flex items-center gap-1">
                              <Icon name="checkCircle" className="w-3 h-3" /> Validar
                            </button>
                          ) : (
                            <span className="text-emerald-400 font-bold flex items-center gap-1">
                              <Icon name="checkCircle" className="w-3.5 h-3.5" /> VALIDADO
                            </span>
                          )}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            <div className="bg-slate-950 border border-slate-800 rounded-xl p-5 space-y-3">

                <Icon name="lock" className="w-4 h-4 text-emerald-400" />
              </h3>
              <div className="space-y-2.5 max-h-[300px] overflow-y-auto">
                {blockchain.map(block => (
                  <div key={block.index} className="p-3 bg-slate-900/40 border border-slate-900 rounded font-mono text-[10px] space-y-1">
                    <div className="flex justify-between items-center text-slate-400">
                      <span className="font-bold text-cyan-400"># {block.index}</span>
                      <span>{new Date(block.timestamp).toLocaleTimeString()}</span>

                    <div className="text-white font-semibold">{block.action}</div>

                    <div className="flex justify-between text-[9px] text-slate-500 pt-0.5 border-t border-slate-900/60">

                    </div>
                  </div>
                ))}
              </div>
            </div>
