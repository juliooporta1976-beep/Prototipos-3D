<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NEPTUNE Swarm Drone Simulation - Dr. Julio César Oporta Barrera</title>
  
  <!-- CSS & ICDN Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    body {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background-color: #010408;
    }
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #010306;
    }
    ::-webkit-scrollbar-thumb {
      background: #11253a;
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00d2ff;
    }
    
    /* Range Slider Styling */
    input[type=range] {
      -webkit-appearance: none;
      background: #102138;
      height: 4px;
      border-radius: 9999px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 9999px;
      background: #00d2ff;
      cursor: pointer;
      box-shadow: 0 0 5px #00d2ff;
      transition: transform 0.15s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body class="text-[#b0c4de] select-none h-screen flex flex-col overflow-hidden">

  <!-- HEADER -->
  <header class="bg-gradient-to-b from-[#080e18]/98 to-[#010408]/92 border-b-2 border-[#00d2ff] px-5 py-3 flex flex-wrap md:flex-nowrap justify-between items-center z-50 sticky top-0 gap-2">
    <div>
      <div id="lbl-author" class="text-[9.5px] font-bold text-[#ea8aff] tracking-[0.2em] uppercase"></div>
      <h1 id="lbl-title" class="text-lg font-bold text-white tracking-wider mt-0.5"></h1>
      <p id="lbl-subtitle" class="text-[9.5px] text-[#7c94b5]"></p>
    </div>
    
    <div class="flex items-center gap-3">
      <!-- Optical Cinema Filters selector -->
      <div class="flex items-center gap-1.5 bg-[#0b1323]/80 border border-[#132d4a] px-2.5 py-1 rounded">
        <i data-lucide="sparkles" class="w-3 h-3 text-[#ea8aff]"></i>
        <span id="lbl-filter-visual" class="text-[8px] font-bold text-white uppercase tracking-wider mr-1"></span>
        <div class="flex gap-1">
          <button id="f-tact" onclick="setVisualFilter('BLUEPRINT')" class="text-[7.5px] font-bold px-1.5 py-0.5 rounded transition-all"></button>
          <button id="f-biol" onclick="setVisualFilter('BIOLUMINESCENT')" class="text-[7.5px] font-bold px-1.5 py-0.5 rounded transition-all"></button>
          <button id="f-cosm" onclick="setVisualFilter('COSMIC')" class="text-[7.5px] font-bold px-1.5 py-0.5 rounded transition-all"></button>
          <button id="f-cryo" onclick="setVisualFilter('CRYOGENIC')" class="text-[7.5px] font-bold px-1.5 py-0.5 rounded transition-all"></button>
        </div>
      </div>

      <!-- Multilingual control buttons -->
      <div class="flex items-center gap-1.5 bg-[#0b1323]/80 border border-[#132d4a] px-2 py-0.5 rounded">
        <i data-lucide="languages" class="w-3 h-3 text-[#00d2ff]"></i>
        <button id="btn-es" onclick="changeLanguage('es')" class="px-2 py-0.5 text-[9.5px] font-semibold transition-all rounded-xs">ES</button>
        <button id="btn-en" onclick="changeLanguage('en')" class="px-2 py-0.5 text-[9.5px] font-semibold transition-all rounded-xs">EN</button>
        <button id="btn-zh" onclick="changeLanguage('zh')" class="px-2 py-0.5 text-[9.5px] font-semibold transition-all rounded-xs">ZH</button>
      </div>
    </div>
  </header>

  <!-- DASHBOARD GRID -->
  <main class="flex-1 grid grid-cols-1 lg:grid-cols-[305px_1fr_335px] min-h-0 overflow-hidden">
    
    <!-- LEFT PANEL -->
    <section class="bg-[#03070e]/97 border-r border-[#00d2ff]/15 p-4 overflow-y-auto flex flex-col gap-4">
      
      <!-- Implementation Phases section -->
      <div class="flex flex-col gap-2.5">
        <div class="flex items-center gap-2 border-l-3 border-[#ea8aff] pl-2 py-0.5">
          <i data-lucide="compass" class="w-3.5 h-3.5 text-[#ea8aff]"></i>
          <h2 id="lbl-phasesTitle" class="text-xs font-bold text-white uppercase tracking-wider"></h2>
        </div>
        <div class="grid grid-cols-5 gap-1">
          <button id="phase-ALFA" onclick="selectPhase('ALFA')" class="phase-btn py-1 text-[8.5px] font-bold rounded-xs cursor-pointer border transition-all truncate text-center"></button>
          <button id="phase-BETA" onclick="selectPhase('BETA')" class="phase-btn py-1 text-[8.5px] font-bold rounded-xs cursor-pointer border transition-all truncate text-center"></button>
          <button id="phase-GAMMA" onclick="selectPhase('GAMMA')" class="phase-btn py-1 text-[8.5px] font-bold rounded-xs cursor-pointer border transition-all truncate text-center"></button>
          <button id="phase-DELTA" onclick="selectPhase('DELTA')" class="phase-btn py-1 text-[8.5px] font-bold rounded-xs cursor-pointer border transition-all truncate text-center"></button>
          <button id="phase-OMEGA" onclick="selectPhase('OMEGA')" class="phase-btn py-1 text-[8.5px] font-bold rounded-xs cursor-pointer border transition-all truncate text-center"></button>
        </div>
        <div id="phase-description" class="bg-[#121021]/60 border border-[#ea8aff]/20 p-2.5 rounded-sm text-[9.5px] leading-relaxed text-[#c4d4ee]"></div>
      </div>

      <!-- Biomechanical Energy Card -->
      <div class="border border-[#0ea5e9]/20 bg-[#06101d]/45 p-3 rounded flex flex-col gap-2.5 transition-all">
        <div class="flex items-center gap-1.5 border-l-3 border-[#ea8aff] pl-2 py-0.5">
          <i data-lucide="zap" class="w-3.5 h-3.5 text-[#ea8aff] animate-pulse"></i>
          <h2 id="lbl-energyTitle" class="text-[10px] font-bold text-white uppercase tracking-wider"></h2>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="flex flex-col gap-0.5">
            <div class="flex justify-between text-[9px]">
              <span id="lbl-atp-desc" class="text-[#89a0be]"></span>
              <span id="val-energy-atp" class="font-bold text-emerald-400">85%</span>
            </div>
            <div class="w-full h-1.5 bg-[#091422] rounded-full overflow-hidden">
              <div id="energy-progress" class="h-full bg-emerald-400 transition-all duration-300" style="width: 85%;"></div>
            </div>
          </div>
          <div class="flex justify-between items-center text-[9.5px]">
            <span id="lbl-thermo-desc" class="text-[#89a0be]"></span>
            <span id="val-thermo-met" class="text-[#00ffff] font-bold">15.4 uW</span>
          </div>
          <div class="flex justify-between items-center text-[9.5px]">
            <span id="lbl-cryo-desc" class="text-[#89a0be]"></span>
            <span id="val-cryo-met" class="text-white font-bold">98.5% OK</span>
          </div>
        </div>
      </div>

      <!-- Fluid Physics Card -->
      <div class="border border-[#00d2ff]/20 bg-[#06101d]/45 p-3 rounded flex flex-col gap-2.5 transition-all">
        <div class="flex items-center gap-1.5 border-l-3 border-[#00d2ff] pl-2 py-0.5">
          <i data-lucide="layers" class="w-3.5 h-3.5 text-[#00d2ff]"></i>
          <h2 id="lbl-physicsTitle" class="text-[10px] font-bold text-white uppercase tracking-wider"></h2>
        </div>
        <div class="flex flex-col gap-2 text-[9.5px]">
          <div class="flex justify-between items-center">
            <span id="lbl-ice-desc" class="text-[#89a0be]"></span>
            <span id="val-ice-tensile" class="text-white font-bold">78.2 MPa</span>
          </div>
          <div class="flex justify-between items-center">
            <span id="lbl-convection-desc" class="text-[#89a0be]"></span>
            <span id="val-convection-vector" class="text-[#00ffff] font-mono leading-none"></span>
          </div>
          <div class="flex justify-between items-center">
            <span id="lbl-buoyancy-desc" class="text-[#89a0be]"></span>
            <span id="val-net-buoyancy" class="text-white font-mono font-bold">0.005 N</span>
          </div>
          <div class="grid grid-cols-2 gap-1.5 mt-1 border-t border-[#00d2ff]/10 pt-2">
            <button id="btn-pulse" onclick="triggerHydroPulse()" class="py-1 px-1.5 bg-[#ea8aff]/15 text-[#ea8aff] border border-[#ea8aff]/30 text-[8.5px] font-bold uppercase rounded hover:bg-[#ea8aff]/30 transition-all cursor-pointer rounded-xs"></button>
            <button id="btn-sync" onclick="triggerSyncPhase()" class="py-1 px-1.5 bg-[#00d2ff]/15 text-[#00d2ff] border border-[#00d2ff]/30 text-[8.5px] font-bold uppercase rounded hover:bg-[#00d2ff]/30 transition-all cursor-pointer rounded-xs"></button>
          </div>
        </div>
      </div>

      <!-- Variables selectors sliders -->
      <div class="flex items-center gap-2 border-l-3 border-[#00d2ff] pl-2 py-0.5">
        <i data-lucide="settings-2" class="w-3.5 h-3.5 text-[#00d2ff]"></i>
        <h2 id="lbl-controlTitle" class="text-xs font-bold text-white uppercase tracking-wider"></h2>
      </div>
      <div class="flex flex-col gap-3 select-none">
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-drift"></span>
            <span class="text-[#00d2ff] font-bold" id="val-drift"></span>
          </label>
          <input type="range" id="input-drift" min="0" max="5" step="0.1" value="1.5" oninput="updateParam('driftSpeed', parseFloat(this.value))">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-curr"></span>
            <span class="text-[#00d2ff] font-bold" id="val-curr"></span>
          </label>
          <input type="range" id="input-curr" min="0" max="3" step="0.1" value="1.8" oninput="updateParam('currentIntensity', parseFloat(this.value))">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-dens"></span>
            <span class="text-[#00d2ff] font-bold" id="val-dens"></span>
          </label>
          <input type="range" id="input-dens" min="10" max="90" step="1" value="42" oninput="updateParam('density', parseFloat(this.value))">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-temp"></span>
            <span class="text-[#00d2ff] font-bold" id="val-temp"></span>
          </label>
          <input type="range" id="input-temp" min="-180" max="2" step="1" value="-120" oninput="updateParam('ambientTemp', parseFloat(this.value))">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-sal"></span>
            <span class="text-[#00d2ff] font-bold" id="val-sal"></span>
          </label>
          <input type="range" id="input-sal" min="0" max="100" step="1" value="35" oninput="updateParam('salinity', parseFloat(this.value))">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[9.5px] text-[#8ea4c1] flex justify-between">
            <span id="lbl-bio"></span>
            <span class="text-[#00d2ff] font-bold" id="val-bio"></span>
          </label>
          <input type="range" id="input-bio" min="0" max="100" step="5" value="65" oninput="updateParam('bioRatio', parseFloat(this.value))">
        </div>
      </div>
    </section>

    <!-- CENTER VIEWPORT STAGE -->
    <section class="relative flex flex-col items-stretch overflow-hidden bg-[#010204]" id="viewport-stage">
      <div class="flex-1 relative min-h-0">
        <video id="webcam" class="absolute top-0 left-0 w-full h-full object-cover pointer-events-none z-10 opacity-0 transition-opacity duration-500" autoplay playsinline></video>
        <canvas id="simulator" class="absolute top-0 left-0 w-full h-full z-20 cursor-grab active:cursor-grabbing"></canvas>
        
        <!-- Live HUD Stencils -->
        <div class="absolute top-4 left-4 z-30 pointer-events-none bg-black/85 border border-[#00d2ff]/30 p-2.5 text-[9px] flex flex-col gap-0.5 rounded shadow-xl">
          <span class="text-[#00d2ff] font-bold">COSPAR CATEGORY V COMPLIANT</span>
          <span>SYSTEM STATE: <strong id="hud-mode-ind" class="text-white">SCANNING</strong></span>
          <span>PHASE: <strong id="hud-phase-ind" class="text-[#ea8aff]">DELTA</strong></span>
          <span class="text-[#849fbf]" id="hud-sub-ind"></span>
          <span id="hud-selected-node" class="text-[#ea8aff] font-bold">SELECTED NODE: NONE</span>
        </div>

        <div class="absolute top-4 right-4 z-30 pointer-events-none bg-black/85 border border-[#ea8aff]/30 p-2.5 text-[9px] flex flex-col items-end gap-0.5 rounded shadow-xl">
          <span id="hud-filter-ind" class="text-white font-bold uppercase"></span>
          <span id="hud-optics-ind" class="text-[#00ffd0] font-mono">OPTICS OVERLAY</span>
        </div>

        <!-- Camera stream button -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-40 bg-black/80 rounded-sm">
          <button id="ar-toggle" onclick="toggleAR()" class="flex items-center gap-1.5 px-4 py-2 text-xs font-bold uppercase rounded-xs border border-[#00d2ff] text-[#00d2ff] bg-cyan-950/15 hover:bg-cyan-900/30 transition-all shadow-lg"></button>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <section class="bg-[#03070e]/97 border-l border-[#00d2ff]/15 p-4 overflow-y-auto flex flex-col gap-4">
      
      <div class="flex items-center justify-between border-l-3 border-[#00d2ff] pl-2 py-0.5">
        <div class="flex items-center gap-1.5">
          <i data-lucide="radio" class="w-3.5 h-3.5 text-[#00d2ff]"></i>
          <h2 id="lbl-hudTitle" class="text-xs font-bold text-white uppercase tracking-wider"></h2>
        </div>
        <span class="flex h-1.5 w-1.5 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00d2ff] opacity-75"></span>
          <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#00d2ff]"></span>
        </span>
      </div>

      <!-- Quick Metrics Grid -->
      <div class="grid grid-cols-2 gap-2 select-none">
        <article class="bg-[#0c1525]/45 border border-[#00d2ff]/10 p-2 rounded-xs">
          <div id="lbl-depTitle" class="text-[8.5px] text-[#7c95b7] uppercase"></div>
          <div id="met-depth" class="text-sm font-bold text-white mt-0.5 font-mono">1,240 m</div>
        </article>
        <article class="bg-[#0c1525]/45 border border-[#00d2ff]/10 p-2 rounded-xs">
          <div id="lbl-phTitle" class="text-[8.5px] text-[#7c95b7] uppercase"></div>
          <div id="met-ph" class="text-sm font-bold text-white mt-0.5 font-mono">7.84 pH</div>
        </article>
        <article class="bg-[#0c1525]/45 border border-[#00d2ff]/10 p-2 rounded-xs">
          <div id="lbl-dnaTitle" class="text-[8.5px] text-[#7c95b7] uppercase"></div>
          <div id="met-dna" class="text-sm font-bold text-[#ea8aff] mt-0.5 font-mono">15 PPM</div>
        </article>
        <article class="bg-[#0c1525]/45 border border-[#00d2ff]/10 p-2 rounded-xs">
          <div id="lbl-syncTitle" class="text-[8.5px] text-[#7c95b7] uppercase"></div>
          <div id="met-sync" class="text-sm font-bold text-[#00f5ff] mt-0.5 font-mono">92.4%</div>
        </article>
      </div>

      <!-- Trend Chart -->
      <div class="bg-[#010306] border border-dashed border-[#00d2ff]/20 rounded-sm p-1 h-[55px]">
        <canvas id="miniChart" class="w-full h-full block"></canvas>
      </div>

      <!-- Extended dynamic telemetry system diagnostic buttons as cards -->
      <div class="flex flex-col gap-2 border border-[#00d2ff]/20 bg-[#06101d]/45 p-3 rounded">
        <span id="lbl-diagTitle" class="text-[10px] font-bold text-white uppercase tracking-wider block border-b border-[#00d2ff]/10 pb-1"></span>
        
        <!-- Live Loading bar -->
        <div id="diagnostic-loader" class="hidden bg-gradient-to-r from-cyan-950 to-[#02040c] border border-cyan-400 p-2 rounded mb-1 text-[9px] flex flex-col gap-1.5">
          <div class="flex justify-between items-center text-white">
            <span class="font-bold flex items-center gap-1">
              <i data-lucide="activity" class="w-3 h-3 text-[#00ffff] animate-spin"></i>
              <span id="diag-loading-indicator"></span>
            </span>
            <span id="diagnostic-percent">0%</span>
          </div>
          <div class="w-full bg-cyan-900/30 h-1 rounded overflow-hidden">
            <div id="diagnostic-bar" class="bg-cyan-400 h-full transition-all duration-300" style="width: 0%;"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <button id="diag-b-mesh" onclick="startDiagnostic('ACOUSTIC')" class="bg-[#0b1323]/50 p-2 border border-[#00d2ff]/10 text-left rounded hover:border-[#00d2ff]/40 transition-all outline-none">
            <div class="text-[8px] text-[#7d93ae] uppercase" id="diag-lbl-mesh"></div>
            <div id="val-acoustic-net-db" class="text-xs font-bold text-white font-mono mt-0.5">82.4 dB</div>
            <span class="text-[7px] text-[#00d2ff] opacity-60 block mt-1">⚡ calibrador</span>
          </button>
          
          <button id="diag-b-spec" onclick="startDiagnostic('EDNA')" class="bg-[#0b1323]/50 p-2 border border-[#00d2ff]/10 text-left rounded hover:border-[#00d2ff]/40 transition-all outline-none">
            <div class="text-[8px] text-[#7d93ae] uppercase" id="diag-lbl-spec"></div>
            <div id="val-edna-mutation-rate" class="text-xs font-bold text-[#ea8aff] font-mono mt-0.5">1.042 ppm</div>
            <span class="text-[7px] text-[#ea8aff] opacity-60 block mt-1">⚡ calibrador</span>
          </button>

          <button id="diag-b-cospar" onclick="startDiagnostic('COSPAR')" class="bg-[#0b1323]/50 p-2 border border-[#00d2ff]/10 text-left rounded hover:border-amber-500/40 transition-all outline-none">
            <div class="text-[8px] text-[#7d93ae] uppercase" id="diag-lbl-cospar"></div>
            <div id="val-cospar-safety" class="text-xs font-bold text-emerald-400 font-mono mt-0.5">99.8% OK</div>
            <span class="text-[7px] text-emerald-400 opacity-60 block mt-1">✓ auditing</span>
          </button>

          <button id="diag-b-sync" onclick="startDiagnostic('SYNC')" class="bg-[#0b1323]/50 p-2 border border-[#00d2ff]/10 text-left rounded hover:border-purple-500/40 transition-all outline-none">
            <div class="text-[8px] text-[#7d93ae] uppercase" id="diag-lbl-sync"></div>
            <div id="val-toroidal-sync" class="text-xs font-bold text-[#00ffc4] font-mono mt-0.5">92.4%</div>
            <span class="text-[7px] text-[#00ffc4] opacity-60 block mt-1">⚡ calibrador</span>
          </button>
        </div>
      </div>

      <!-- Node Inspect Panel -->
      <div id="individual-node-panel-root" class="hidden relative"></div>

      <!-- Triple Pillars of the Living Swarm -->
      <div class="flex flex-col gap-2">
        <span id="lbl-pillars-title" class="text-[10.5px] font-bold text-white uppercase tracking-wider"></span>
        <div class="flex flex-col gap-1.5 text-[9px]">
          <div class="border border-[#00d2ff]/12 bg-[#0c1424]/30 p-2 rounded-xs">
            <span id="pillar-p1-title" class="font-bold text-[#ea8aff] tracking-wide block"></span>
            <span id="pillar-p1-desc" class="text-[#849fbf] leading-relaxed mt-0.5 block"></span>
          </div>
          <div class="border border-[#00d2ff]/12 bg-[#0c1424]/30 p-2 rounded-xs">
            <span id="pillar-p2-title" class="font-bold text-[#ea8aff] tracking-wide block"></span>
            <span id="pillar-p2-desc" class="text-[#849fbf] leading-relaxed mt-0.5 block"></span>
          </div>
          <div class="border border-[#00d2ff]/12 bg-[#0c1424]/30 p-2 rounded-xs">
            <span id="pillar-p3-title" class="font-bold text-[#ea8aff] tracking-wide block"></span>
            <span id="pillar-p3-desc" class="text-[#849fbf] leading-relaxed mt-0.5 block"></span>
          </div>
        </div>
      </div>

      <!-- Operating protocols list -->
      <div class="flex flex-col gap-2">
        <span id="lbl-modesTitle" class="text-[10.5px] font-bold text-white uppercase tracking-wider"></span>
        <div class="flex flex-col gap-1.5">
          <button id="mode-dormant" onclick="setMode('DORMANT')" class="mode-item text-align-left w-full text-left p-2 border rounded-xs transition-all outline-none">
            <div id="lbl-mDorm" class="text-[10px] font-bold text-white uppercase"></div>
            <div id="lbl-mDormD" class="text-[8.5px] text-[#7d96b5] mt-0.5 leading-tight"></div>
          </button>
          <button id="mode-scanning" onclick="setMode('SCANNING')" class="mode-item text-align-left w-full text-left p-2 border rounded-xs transition-all outline-none">
            <div id="lbl-mScan" class="text-[10px] font-bold text-white uppercase"></div>
            <div id="lbl-mScanD" class="text-[8.5px] text-[#7d96b5] mt-0.5 leading-tight"></div>
          </button>
          <button id="mode-transmission" onclick="setMode('TRANSMISSION')" class="mode-item text-align-left w-full text-left p-2 border rounded-xs transition-all outline-none">
            <div id="lbl-mTransmit" class="text-[10px] font-bold text-white uppercase"></div>
            <div id="lbl-mTransmitD" class="text-[8.5px] text-[#7d96b5] mt-0.5 leading-tight"></div>
          </button>
          <button id="mode-autolysis" onclick="setMode('AUTOLYSIS')" class="mode-item text-align-left w-full text-left p-2 border rounded-xs transition-all outline-none">
            <div id="lbl-mAutolysis" class="text-[10px] font-bold text-red-400 uppercase"></div>
            <div id="lbl-mAutolysisD" class="text-[8.5px] text-[#7d96b5] mt-0.5 leading-tight"></div>
          </button>
        </div>
      </div>

    // --- 3D CANVAS MATHEMATICAL PROJECTION ENGINE ---
    const canvas = document.getElementById('simulator');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = canvas.offsetWidth;
    let height = canvas.height = canvas.offsetHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = canvas.offsetWidth;
      height = canvas.height = canvas.offsetHeight;
    });

    let rotX = 0.4, rotY = 0.6;
    let scale = 1.25;
    let time = 0;
    let isDragging = false;
    let startX = 0, startY = 0;
    let lastMouseX = 0, lastMouseY = 0;

    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.clientX; startY = e.clientY;
      lastMouseX = e.clientX; lastMouseY = e.clientY;
    });

    canvas.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      rotY += dx * 0.007;
      rotX += dy * 0.007;
      lastMouseX = e.clientX; lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', e => {
      isDragging = false;
      const dX = Math.abs(e.clientX - startX);
      const dY = Math.abs(e.clientY - startY);
      if (dX < 3 && dY < 3) {
        handleCanvasClick(e);
      }
    });

    // Swarm particles array
    const swarmParticles = [];
    for (let i = 0; i < 22; i++) {
      swarmParticles.push({
        x: (Math.random() - 0.5) * 440,
        y: (Math.random() - 0.5) * 440,
        z: (Math.random() - 0.5) * 400,
        id: i
      });
    }

    // Project coordinates
    const fov = 350;
    const dist = 400;

    function project(x, y, z, cRotX, cRotY) {
      const cosA = Math.cos(cRotX);
      const sinA = Math.sin(cRotX);
      const cosB = Math.cos(cRotY);
      const sinB = Math.sin(cRotY);

      let x1 = x * cosB - z * sinB;
      let z1 = x * sinB + z * cosB;
      let y2 = y * cosA - z1 * sinA;
      let z2 = y * sinA + z1 * cosA;

      const sx = x1 * scale;
      const sy = y2 * scale;
      const sz = z2 * scale;
      const scaleProj = fov / (fov + sz + dist);
      
      return {
        x: (width / 2) + sx * scaleProj,
        y: (height / 2) + sy * scaleProj,
        visible: sz + dist > 40,
        z: sz
      };
    }

    function handleCanvasClick(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      let closestId = null;
      let minDistance = 24;

      const renderedParts = getActiveParticles();
      const rY = rotY + time * 0.0035;
      const rX = rotX + Math.sin(time * 0.005) * 0.06;

      renderedParts.forEach(p => {
        let pX = p.x;
        let pY = p.y;
        if (activePhase !== "OMEGA" && activePhase !== "GAMMA") {
          pX += (params.driftSpeed * 0.25) * (0.8 + Math.sin(p.id + time * 0.004) * 0.2);
          pY += (params.density - 42) * 0.008;
        }

        const bLength = 230;
        while (pX > bLength) pX -= (bLength * 2);
        while (pX < -bLength) pX += (bLength * 2);
        while (pY > bLength) pY -= (bLength * 2);
        while (pY < -bLength) pY += (bLength * 2);

        const proj = project(pX, pY, p.z, rX, rY);
        const dX = mouseX - proj.x;
        const dY = mouseY - proj.y;
        const d = Math.sqrt(dX * dX + dY * dY);
        
        if (d < minDistance) {
          minDistance = d;
          closestId = p.id;
        }
      });

      if (closestId !== null) {
        selectedNodeId = closestId;
        document.getElementById('hud-selected-node').innerText = "SELECTED LOCK: NODE_" + String(closestId).padStart(2 ,'0');
        addLog("PINNED SIGNAL ON PORT NODE_" + String(closestId).padStart(2 ,'0'));
      } else {
        selectedNodeId = null;
        document.getElementById('hud-selected-node').innerText = "SELECTED LOCK: NONE";
      }
      renderSelectedNodePanel();
    }

    function getActiveParticles() {
      if (activePhase === "ALFA") {
        return swarmParticles.slice(0, 6);
      } else if (activePhase === "BETA") {
        return swarmParticles.map((p, i) => ({
          ...p,
          x: p.x * (1.1 + Math.sin(time * 0.005 + i) * 0.1),
          y: p.y * (1.1 + Math.cos(time * 0.005 + i) * 0.1)
        }));
      } else if (activePhase === "GAMMA") {
        return swarmParticles.map(p => ({
          ...p,
          x: (p.x * 0.25) + Math.cos(p.id) * 35,
          y: p.y
        }));
      } else if (activePhase === "OMEGA") {
        return swarmParticles.map((p, i) => {
          const angle = (i / swarmParticles.length) * Math.PI * 2 + time * 0.008;
          const radius = 130 + Math.sin(time * 0.02 + i) * 15;
          return {
            ...p,
            x: Math.cos(angle)*radius,
            y: Math.sin(time*0.005 + i)*40,
            z: Math.sin(angle)*radius
          };
        });
      }
      return swarmParticles;
    }

    // Animation frames render loop
    function animate() {

      const isDormant = activeMode === "DORMANT";

      // Depth oscillations
      const calcDepth = Math.max(150, Math.floor(1240 + (params.density - 42) * 5.2 + Math.sin(time * 0.05) * 6 * params.currentIntensity));

      const calcDna = isDormant ? 0 : Math.floor((12 + Math.sin(time * 0.06) * 4) * (params.bioRatio / 100));

      document.getElementById('met-depth').innerText = calcDepth.toLocaleString() + ' m';
      document.getElementById('met-ph').innerText = calcPh + ' pH';
      document.getElementById('met-dna').innerText = calcDna + ' PPM';

      chartData.shift();
      const nextVal = isAutol ? 5 : isDormant ? 25 : 35 + Math.sin(time * 0.1) * 12 * params.currentIntensity + (params.bioRatio * 0.28);
      chartData.push(nextVal);
      drawMiniChart();

      if (time % 8 === 0) {
        recomputeSimulationVariables();
      }

      // Drawing backgrounds and matrices
      if (activeAR) {
        ctx.clearRect(0, 0, width, height);
      } else {
        const radial = ctx.createRadialGradient(width/2, height/2, 40, width/2, height/2, Math.max(width, height)*0.85);
        radial.addColorStop(0, isAutol ? '#0f0505' : activePhase === 'OMEGA' ? '#0a0316' : '#040b17');
        radial.addColorStop(0.5, '#01050e');
        radial.addColorStop(1, '#000103');
        ctx.fillStyle = radial;
        ctx.fillRect(0,0,width,height);

        // Volumetric convection flows
        ctx.strokeStyle = isAutol ? 'rgba(239, 68, 68, 0.03)' : activePhase === 'OMEGA' ? 'rgba(180, 80, 255, 0.04)' : 'rgba(0, 191, 255, 0.04)';
        ctx.lineWidth = 1.3;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          const rY = (height/6) * (i+1) + Math.sin(time * 0.01 + i) * 15;
          for (let x = 0; x <= width; x += 25) {
            const th = (x/width) * Math.PI*4 + time*0.012*(params.driftSpeed+0.1);
            const wY = rY + Math.sin(th)*13*params.currentIntensity;
            if (x===0) ctx.moveTo(x, wY);
            else ctx.lineTo(x, wY);
          }
          ctx.stroke();
        }
      }

      // Environmental borders (Ice overlay at top)
      if (!activeAR) {
        ctx.fillStyle = isAutol ? 'rgba(120, 80, 80, 0.06)' : 'rgba(100, 200, 255, 0.07)';
        ctx.fillRect(0, 0, width, 30);
        ctx.strokeStyle = isAutol ? 'rgba(239, 68, 68, 0.2)' : 'rgba(0, 191, 255, 0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0,30);
        for(let x=0; x<=width; x+=40){ ctx.lineTo(x, 30+Math.sin(x*0.05)*4); }
        ctx.lineTo(width,0); ctx.lineTo(0,0); ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      // Projections parameters
      const rY = rotY + time * 0.0035;
      const rX = rotX + Math.sin(time * 0.005) * 0.06;

      // Dynamic flow micro particles
      {
        for (let d = 0; d < 18; d++) {
          const dTime = time * 0.005 + d * 157.32;
          const pX = Math.sin(dTime * 0.8) * 230 + Math.cos(dTime * 0.3) * 60;
          const pY = ((dTime * 28) % 460) - 210; 
          const pZ = Math.cos(dTime * 0.6) * 230;

          const proj = project(pX, pY, pZ, rX, rY);
          if (proj.visible && proj.x > 0 && proj.x < width && proj.y > 0 && proj.y < height) {
            const scalePct = Math.max(0.3, 1 - (pZ + 200) / 400);
            ctx.fillStyle = isAutol ? 'rgba(239, 68, 68, 0.35)' : activePhase === 'OMEGA' ? 'rgba(180, 80, 255, 0.4)' : 'rgba(0,230,255,0.35)';
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 2 * scalePct, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // Drawing background physical obstacles (Vertical faults) in Gamma Phase
      if (activePhase === "GAMMA" && !activeAR) {
        ctx.fillStyle = 'rgba(0, 150, 255, 0.03)';
        ctx.strokeStyle = 'rgba(0, 191, 255, 0.12)';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(width/2 - 120, 0); ctx.lineTo(width/2 - 95, height*0.4); ctx.lineTo(width/2 - 130, height*0.7); ctx.lineTo(width/2 - 100, height);
        ctx.lineTo(0, height); ctx.lineTo(0,0); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(width/2 + 120, 0); ctx.lineTo(width/2 + 95, height*0.4); ctx.lineTo(width/2 + 130, height*0.7); ctx.lineTo(width/2 + 100, height);
        ctx.lineTo(width, height); ctx.lineTo(width,0); ctx.closePath(); ctx.fill(); ctx.stroke();
      }

      // Drawing laboratory bounding frame in Alfa Phase
      if (activePhase === "ALFA" && !activeAR) {
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.22)';
        ctx.strokeRect(width/2 - 140*scale, height/2 - 140*scale, 280*scale, 280*scale);
      }

      // Project Swarm Node Particles
      const renderedParts = getActiveParticles();
      const projNodes = [];

      renderedParts.forEach(p => {
        let pX = p.x;
        let pY = p.y;
        if (activePhase !== "OMEGA" && activePhase !== "GAMMA") {
          pX += (params.driftSpeed * 0.25) * (0.8 + Math.sin(p.id + time * 0.004) * 0.2);
          pY += (params.density - 42) * 0.008;
        }

        const bLength = 230;
        while (pX > bLength) pX -= (bLength * 2);
        while (pX < -bLength) pX += (bLength * 2);
        while (pY > bLength) pY -= (bLength * 2);
        while (pY < -bLength) pY += (bLength * 2);

        const proj = project(pX, pY, p.z, rX, rY);
        projNodes.push({ id: p.id, x: pX, y: pY, px: proj.x, py: proj.y, pz: proj.z, visible: proj.visible });
      });

      // Swarm Acoustic Networks link lines
      if (activeMode !== "DORMANT") {
        ctx.lineWidth = 1;
        for (let i = 0; i < projNodes.length; i++) {
          for (let j = i+1; j < projNodes.length; j++) {
            const dx = projNodes[i].x - projNodes[j].x;
            const dy = projNodes[i].y - projNodes[j].y;
            const sqDist = dx*dx + dy*dy;
            const limit = activePhase === "OMEGA" ? 30000 : 18000;
            if (sqDist < limit) {
              const ratio = 1 - (sqDist/limit);
              ctx.strokeStyle = isAutol 
                ? 'rgba(239, 68, 68, ' + (0.12 * ratio) + ')'
                : activePhase === "OMEGA" 
                  ? 'rgba(180, 80, 255, ' + (0.2 * ratio) + ')'
                  : 'rgba(0, 191, 255, ' + (0.15 * ratio) + ')';
              ctx.beginPath();
              ctx.moveTo(projNodes[i].px, projNodes[i].py);
              ctx.lineTo(projNodes[j].px, projNodes[j].py);
              ctx.stroke();
            }
          }
        }
      }

      // Draw swarm nodes
      projNodes.forEach(p => {
        if (p.visible && p.px > 0 && p.px < width && p.py > 0 && p.py < height) {
          const rSize = Math.max(1.2, 3.5 * (1 - (p.pz + 200)/400));
          ctx.fillStyle = isAutol ? 'rgba(239,68,68,0.65)' : activePhase === "OMEGA" ? 'rgba(180,80,255,0.65)' : 'rgba(0,191,255,0.6)';
          ctx.beginPath(); ctx.arc(p.px, p.py, rSize, 0, Math.PI*2); ctx.fill();
        }
      });

      // Reticle for selected single swarm particle node lock
      if (selectedNodeId !== null) {
        const selP = projNodes.find(p => p.id === selectedNodeId);
        if (selP && selP.visible && selP.px > 0 && selP.px < width && selP.py > 0 && selP.py < height) {
          ctx.save();
          const pR = 9 + Math.sin(time * 0.1) * 3;
          ctx.strokeStyle = '#ea8aff';
          ctx.lineWidth = 1.3;
          ctx.beginPath(); ctx.arc(selP.px, selP.py, pR, 0, Math.PI*2); ctx.stroke();
          
          ctx.strokeStyle = 'rgba(234,138,255,0.3)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath(); ctx.arc(selP.px, selP.py, pR + 5, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }
      }

      // Draw dynamic concentric Equipressure circle borders
      if (!activeAR) {
        ctx.save();
        ctx.strokeStyle = isAutol ? 'rgba(239, 68, 68, 0.08)' : activePhase === "OMEGA" ? 'rgba(180, 80, 255, 0.12)' : 'rgba(0, 246, 255, 0.12)';
        ctx.lineWidth = 1; ctx.setLineDash([2, 5]);
        ctx.beginPath();
        const steps = 30;
        const tempR = (65 * (1 + Math.sin(time * (activeMode === "SCANNING" ? 0.024 : 0.012)) * 0.12 * (params.bioRatio / 100))) * 1.35;
        for (let r = 0; r <= steps; r++) {
          const rAng = (r / steps) * Math.PI * 2;
          const pr = project(Math.cos(rAng)*tempR, 0, Math.sin(rAng)*tempR, rX, rY);
          if (r === 0) ctx.moveTo(pr.x, pr.y);
          else ctx.lineTo(pr.x, pr.y);
        }
        ctx.stroke(); ctx.restore();
      }

      // --- MAIN SWARM BIOMIMETIC ORGANISM DRAW ---
      const flex = Math.sin(time * (activeMode === "SCANNING" ? 0.024 : 0.012)) * 0.12 * (params.bioRatio / 100);
      const rad = 65 * (1 + flex);

      const metallicEdge = isAutol ? '#ff7f7f' : activePhase === 'OMEGA' ? '#ac74ff' : '#3daef2';

      // 1. Double helical biomimetic internal nucleus core
      {
        const inRad = rad * 0.35;
        ctx.save();
        ctx.strokeStyle = isAutol ? 'rgba(255, 100, 100, 0.65)' : activePhase === 'OMEGA' ? 'rgba(216, 102, 255, 0.7)' : 'rgba(0, 246, 255, 0.7)';
        ctx.lineWidth = 1.5 * scale;
        
        const h1 = [], h2 = [];
        const hHeight = inRad * 1.5;
        const segs = 12;

        for (let i = 0; i <= segs; i++) {
          const hPct = i / segs;
          const hY = -hHeight / 2 + hPct * hHeight;
          const hAngle = hPct * Math.PI * 2 + time * 0.06;
          const hRadius = inRad * 0.45 * Math.sin(hPct * Math.PI);

          h1.push(project(Math.cos(hAngle) * hRadius, hY, Math.sin(hAngle) * hRadius, rX, rY));
          h2.push(project(Math.cos(hAngle + Math.PI) * hRadius, hY, Math.sin(hAngle + Math.PI) * hRadius, rX, rY));
        }

        ctx.beginPath(); ctx.moveTo(h1[0].x, h1[0].y);
        for (let idx = 1; idx < h1.length; idx++) { ctx.lineTo(h1[idx].x, h1[idx].y); }
        ctx.stroke();

        ctx.beginPath(); ctx.moveTo(h2[0].x, h2[0].y);
        for (let idx = 1; idx < h2.length; idx++) { ctx.lineTo(h2[idx].x, h2[idx].y); }
        ctx.stroke();

        ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        for (let idx = 1; idx < h1.length - 1; idx += 2) {
          ctx.beginPath(); ctx.moveTo(h1[idx].x, h1[idx].y); ctx.lineTo(h2[idx].x, h2[idx].y); ctx.stroke();
        }
        ctx.restore();
      }

      // 2. Translucent osmosis mid layer protective film
      {
        const midMax = rad * 0.62;
        ctx.strokeStyle = isAutol ? 'rgba(255, 50, 50, 0.15)' : 'rgba(0, 240, 255, ' + (0.12 + flex) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(width/2, height/2, midMax*scale, 0, Math.PI*2); ctx.stroke();
      }

      // 3. Four outer rotational biomech shield plates with dynamic gradient finishes
      {
        const shieldRad = rad * 0.94;
        const plateSpacing = 0.25;
        const spin = time * 0.0035;
        ctx.lineWidth = 3 * scale;
        for (let p=0; p<4; p++) {
          const st = (p/4)*Math.PI*2 + spin;
          const en = st + (Math.PI*2)/4 - plateSpacing;
          
          ctx.strokeStyle = metallicEdge;
          ctx.beginPath();
          const vertices = [];
          for (let r=0; r<=15; r++) {
            const th = st + (en-st)*(r/15);
            const vx = Math.cos(th)*shieldRad;
            const vy = Math.sin(th)*shieldRad*0.58;
            const vz = Math.cos(th*2)*shieldRad*0.35;
            vertices.push({x: vx, y: vy, z: vz});
          }
          const p1 = project(vertices[0].x, vertices[0].y, vertices[0].z, rX, rY);
          ctx.moveTo(p1.x, p1.y);
          for (let r=1; r<vertices.length; r++) {
            const pr = project(vertices[r].x, vertices[r].y, vertices[r].z, rX, rY);
            ctx.lineTo(pr.x, pr.y);
          }
          ctx.stroke();

          const fAngle = (st + en) / 2;
          const gX1 = width/2 + Math.cos(fAngle - Math.PI / 4) * (shieldRad * 0.4) * scale;
          const gY1 = height/2 + Math.sin(fAngle - Math.PI / 4) * (shieldRad * 0.4) * scale;
          const gX2 = width/2 + Math.cos(fAngle + Math.PI / 4) * (shieldRad * 0.95) * scale;
          const gY2 = height/2 + Math.sin(fAngle + Math.PI / 4) * (shieldRad * 0.95) * scale;

          const pGrad = ctx.createLinearGradient(gX1, gY1, gX2, gY2);
          if (isAutol) {
            pGrad.addColorStop(0, '#120202'); pGrad.addColorStop(0.5, 'rgba(130, 20, 20, 0.95)'); pGrad.addColorStop(1, '#ff4c4c');
          } else if (activePhase === "OMEGA") {
            pGrad.addColorStop(0, '#0a0316'); pGrad.addColorStop(0.5, 'rgba(64, 25, 110, 0.95)'); pGrad.addColorStop(1, '#ba8dfa');
          } else {
            pGrad.addColorStop(0, '#030c18'); pGrad.addColorStop(0.5, 'rgba(10, 34, 58, 0.95)'); pGrad.addColorStop(1, '#41a9eb');
          }

          ctx.fillStyle = pGrad;
          ctx.closePath(); ctx.fill();
        }
      }

      // Acoustic node antennas
      {
        [0, Math.PI * 0.67, Math.PI * 1.33].forEach(ang => {
          const pulse = ang + time * 0.0012;
          const p1 = project(Math.cos(pulse)*(rad*0.85), Math.sin(pulse)*(rad*0.85), 0, rX, rY);
          const p2 = project(Math.cos(pulse)*(rad*1.25), Math.sin(pulse)*(rad*1.25), 18*Math.sin(time*0.015+ang), rX, rY);
          ctx.strokeStyle = '#1d3557'; ctx.lineWidth = 1.8*scale;
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
          ctx.fillStyle = isAutol ? '#ff3232' : activePhase === "OMEGA" ? '#d866ff' : '#00f6ff';
          ctx.beginPath(); ctx.arc(p2.x, p2.y, 3*scale, 0, Math.PI*2); ctx.fill();
        });
      }

      // Drawing target floating node telemetry label vector
      {
        const label = project(rad*1.15, -rad*0.65, -15, rX, rY);
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(width/2+15, height/2-15); ctx.lineTo(label.x, label.y); ctx.lineTo(label.x+32, label.y); ctx.stroke();
        ctx.fillStyle = '#00f6ff'; ctx.font = 'bold 9px monospace';
        ctx.fillText("NEPTUNE_PROBE_V", label.x + 38, label.y + 2);
      }

      // Cinema optics compound mixes filters overlay
      if (activeFilter === 'BIOLUMINESCENT') {
        ctx.save(); ctx.globalCompositeOperation = 'color'; ctx.fillStyle = 'rgba(16, 215, 120, 0.15)'; ctx.fillRect(0, 0, width, height); ctx.restore();
      } else if (activeFilter === 'COSMIC') {
        ctx.save(); ctx.globalCompositeOperation = 'color'; ctx.fillStyle = 'rgba(195, 100, 255, 0.15)'; ctx.fillRect(0, 0, width, height); ctx.restore();
      } else if (activeFilter === 'CRYOGENIC') {
        ctx.save(); ctx.globalCompositeOperation = 'color'; ctx.fillStyle = 'rgba(230, 245, 255, 0.1)'; ctx.fillRect(0, 0, width, height); ctx.restore();
      }

      requestAnimationFrame(animate);
    }

    // Initialize application settings
    changeLanguage("es");
    setVisualFilter("BLUEPRINT");
    lucide.createIcons();
    animate();

    // Spawn random telemetry lines in log terminal
    setInterval(() => {
      if (Math.random() < 0.2) {
        if (activeMode === 'SCANNING') {
          addLog(activeLang === 'es' ? '[ANALÍTICA] Recolectando eDNA libre molecular.' : '[TELEMETRY] Scanning dynamic passive marine traces.');
        } else if (activeMode === 'TRANSMISSION') {
          addLog(activeLang === 'es' ? '[ENLACE] Malla acústica retransmitiendo paquetes secuencias.' : '[MESH] Forwarding bio-signals network frames.');
        } else if (activeMode === 'AUTOLYSIS') {
          addLog('[COSPAR] GENETIC CLEANUP PROCESS EXECUTING UNDER STRICT ISOLATED PROTOCOLS.');
        }
      }
    }, 2800);
  </script>
</body>
</html>
