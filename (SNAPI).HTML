<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAPI — Sistema Nacional de Activación Productiva Inmediata</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#0a0c12;--fg:#e0e2e8;--muted:#6b7280;--accent:#FFB300;--accent2:#FFD54F;--card:rgba(10,14,22,0.88);--border:rgba(255,179,0,0.18);--danger:#FF5252;--success:#69F0AE;--warn:#FFD740;--titanium:#3A3D42;--font-h:'Rajdhani',sans-serif;--font-d:'Space Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:var(--font-d);overflow:hidden;width:100vw;height:100vh;user-select:none}
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loading.hidden{opacity:0;visibility:hidden;pointer-events:none}
#loading h1{font-family:var(--font-h);font-size:1.6rem;font-weight:700;letter-spacing:.12em;color:var(--accent);text-shadow:0 0 40px rgba(255,179,0,.45);text-align:center;line-height:1.35;max-width:90vw}
#loading p{color:var(--muted);margin-top:.5rem;font-size:.85rem;letter-spacing:.15em}
.load-bar{width:320px;height:2px;background:rgba(255,179,0,.15);margin-top:2rem;border-radius:2px;overflow:hidden}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .15s;border-radius:2px}
canvas{display:block;position:fixed;inset:0;z-index:1}
.hud{position:fixed;z-index:10;pointer-events:none}
.hud>*{pointer-events:auto}
.hud-top{top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(180deg,rgba(10,12,18,.94) 0%,transparent 100%)}
.hud-logo{display:flex;align-items:center;gap:10px;flex-shrink:1;min-width:0}
.hud-logo .mark{width:28px;height:28px;border:2px solid var(--accent);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.hud-logo .mark::after{content:'';width:12px;height:12px;border:1.5px solid var(--accent);transform:rotate(0deg);opacity:.6}
.hud-logo span{font-family:var(--font-h);font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.hud-state{display:flex;align-items:center;gap:8px;padding:4px 14px;border:1px solid var(--border);border-radius:4px;background:var(--card);backdrop-filter:blur(12px);flex-shrink:0}
.hud-state .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 4px var(--accent)}50%{opacity:.4;box-shadow:none}}
.hud-state label{font-size:.7rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.hud-state .val{font-family:var(--font-h);font-size:.85rem;font-weight:600;color:var(--fg)}
.hud-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hud-clock{font-family:var(--font-h);font-size:.8rem;color:var(--muted);letter-spacing:.1em}
.lang-sel{display:flex;gap:2px}
.lang-sel button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;font-size:.65rem;cursor:pointer;font-family:var(--font-d);letter-spacing:.05em;transition:all .2s}
.lang-sel button.active{color:var(--accent);border-color:var(--accent);background:rgba(255,179,0,.08)}
.lang-sel button:hover{color:var(--fg)}
.btn-icon{width:30px;height:30px;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(8px);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;transition:all .2s;border-radius:3px}
.btn-icon:hover{color:var(--accent);border-color:var(--accent)}
.hud-left{top:70px;left:14px;bottom:80px;width:220px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;scrollbar-width:none}
.hud-left::-webkit-scrollbar{display:none}
.panel{background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:6px;padding:12px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3}
.panel-title{font-family:var(--font-h);font-size:.7rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.panel-title i{font-size:.6rem;opacity:.7}
.phase-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s}
.phase-item:hover{padding-left:4px}
.phase-item:last-child{border:none}
.phase-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--muted);transition:all .3s;flex-shrink:0}
.phase-dot.active{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px var(--accent)}
.phase-dot.complete{border-color:var(--success);background:var(--success)}
.phase-dot.warning{border-color:var(--warn);background:var(--warn)}
.phase-dot.error{border-color:var(--danger);background:var(--danger)}
.phase-name{font-size:.72rem;color:var(--fg);flex:1}
.phase-val{font-family:var(--font-h);font-size:.72rem;color:var(--muted);font-weight:500}
.indicator-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.68rem}
.indicator-row .lbl{color:var(--muted)}
.indicator-row .num{font-family:var(--font-h);font-weight:600;color:var(--fg)}
.indicator-row .num.good{color:var(--success)}
.indicator-row .num.bad{color:var(--danger)}
.mini-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.hud-right-panel{top:70px;right:14px;bottom:80px;width:210px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;scrollbar-width:none}
.hud-right-panel::-webkit-scrollbar{display:none}
.ai-node-mini{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.65rem}
.ai-node-mini .nd{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.7;animation:pulse-dot 1.5s infinite}
.ai-node-mini .nd.off{background:var(--muted);opacity:.3;animation:none}
.ai-node-mini .nm{color:var(--muted);flex:1}
.ai-node-mini .st{color:var(--accent);font-family:var(--font-h);font-weight:500}
.hud-bottom{bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;background:linear-gradient(0deg,rgba(10,12,18,.94) 0%,transparent 100%);flex-wrap:wrap}
.mode-btn{padding:5px 12px;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(8px);color:var(--muted);font-family:var(--font-h);font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;border-radius:3px;white-space:nowrap}
.mode-btn:hover{color:var(--fg);border-color:rgba(255,179,0,.4)}
.mode-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(255,179,0,.1);box-shadow:0 0 12px rgba(255,179,0,.18)}
.cam-controls{position:fixed;bottom:60px;right:14px;z-index:10;display:flex;flex-direction:column;gap:4px}
.cam-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(8px);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;transition:all .2s;border-radius:3px}
.cam-btn:hover,.cam-btn.active{color:var(--accent);border-color:var(--accent)}
.info-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;width:380px;max-width:90vw;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;padding:20px;opacity:0;visibility:hidden;transition:all .3s}
.info-panel.show{opacity:1;visibility:visible}
.info-panel .close-btn{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;transition:color .2s}
.info-panel .close-btn:hover{color:var(--fg)}
.info-panel h3{font-family:var(--font-h);font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:4px}
.info-panel .subtitle{font-size:.7rem;color:var(--muted);letter-spacing:.08em;margin-bottom:12px}
.info-panel p{font-size:.78rem;color:var(--fg);line-height:1.6;margin-bottom:8px;opacity:.85}
.info-panel .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.info-panel .stat-box{background:rgba(255,179,0,.05);border:1px solid var(--border);border-radius:4px;padding:8px;text-align:center}
.info-panel .stat-box .sv{font-family:var(--font-h);font-size:1.2rem;font-weight:700;color:var(--accent)}
.info-panel .stat-box .sl{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.toast-area{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{padding:8px 18px;background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:4px;font-size:.72rem;color:var(--fg);animation:toast-in .3s,toast-out .3s 2.7s forwards;white-space:nowrap}
.toast.warn{border-color:rgba(255,215,64,.4);color:var(--warn)}
.toast.err{border-color:rgba(255,82,82,.4);color:var(--danger)}
.toast.ok{border-color:rgba(105,240,174,.4);color:var(--success)}
@keyframes toast-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(-10px)}}
.crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;opacity:.15}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:var(--accent)}
.crosshair::before{width:1px;height:20px;left:0;top:-10px}
.crosshair::after{width:20px;height:1px;top:0;left:-10px}
.alert-bar{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:25;padding:6px 20px;background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.35);border-radius:4px;font-family:var(--font-h);font-size:.75rem;font-weight:600;color:var(--danger);letter-spacing:.15em;opacity:0;transition:opacity .3s;pointer-events:none}
.alert-bar.show{opacity:1;animation:pulse-dot 1s infinite}
@media(max-width:768px){.hud-left,.hud-right-panel{display:none}.hud-top{padding:8px 12px}.hud-logo span{font-size:.55rem}.mode-btn{padding:4px 8px;font-size:.58rem}}
</style>
</head>
<body>

<div id="loading">
  <h1>SISTEMA NACIONAL DE ACTIVACION<br>PRODUCTIVA INMEDIATA (SNAPI)</h1>
  <p id="load-text">Inicializando sistema...</p>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
</div>

<div class="crosshair"></div>

<div class="alert-bar" id="alert-bar"></div>
<div class="toast-area" id="toast-area"></div>

<div class="hud hud-top">
  <div class="hud-logo">
    <div class="mark"></div>
    <span>SISTEMA NACIONAL DE ACTIVACION PRODUCTIVA INMEDIATA (SNAPI)</span>
  </div>
  <div class="hud-state">
    <div class="dot" id="state-dot"></div>
    <label data-i18n="estado">ESTADO</label>
    <div class="val" id="state-label">REPOSO</div>
  </div>
  <div class="hud-right">
    <div class="hud-clock" id="hud-clock">00:00:00</div>
    <div class="lang-sel">
      <button class="active" data-lang="es">ES</button>
      <button data-lang="en">EN</button>
      <button data-lang="zh">中</button>
    </div>
    <button class="btn-icon" id="btn-ar" title="Realidad Aumentada"><i class="fas fa-vr-cardboard"></i></button>
    <button class="btn-icon" id="btn-fullscreen" title="Pantalla completa"><i class="fas fa-expand"></i></button>
  </div>
</div>

<div class="hud hud-left" id="hud-left">
  <div class="panel">
    <div class="panel-title"><i class="fas fa-layer-group"></i> <span data-i18n="fases_operativas">FASES OPERATIVAS</span></div>
    <div id="phase-list"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><i class="fas fa-chart-line"></i> <span data-i18n="indicadores">INDICADORES</span></div>
    <div id="indicator-list"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><i class="fas fa-bolt"></i> <span data-i18n="energia">ENERGIA DEL SISTEMA</span></div>
    <div class="indicator-row"><span class="lbl" data-i18n="core">Nucleo</span><span class="num good" id="nrg-core">98%</span></div>
    <div class="mini-bar"><div class="mini-bar-fill" id="nrg-core-bar" style="width:98%;background:var(--success)"></div></div>
    <div class="indicator-row" style="margin-top:6px"><span class="lbl" data-i18n="red_ia">Red IA</span><span class="num" id="nrg-ai">76%</span></div>
    <div class="mini-bar"><div class="mini-bar-fill" id="nrg-ai-bar" style="width:76%;background:var(--accent)"></div></div>
    <div class="indicator-row" style="margin-top:6px"><span class="lbl" data-i18n="fases_mod">Fases</span><span class="num good" id="nrg-phases">92%</span></div>
    <div class="mini-bar"><div class="mini-bar-fill" id="nrg-phases-bar" style="width:92%;background:var(--success)"></div></div>
  </div>
</div>

<div class="hud hud-right-panel" id="hud-right">
  <div class="panel">
    <div class="panel-title"><i class="fas fa-brain"></i> <span data-i18n="red_ia_full">RED DE INTELIGENCIA ARTIFICIAL</span></div>
    <div id="ai-nodes-list"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><i class="fas fa-satellite-dish"></i> <span data-i18n="sensores">SENSORES</span></div>
    <div id="sensor-list"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><i class="fas fa-signal"></i> <span data-i18n="telemetria">TELEMETRIA</span></div>
    <div id="telemetry-list"></div>
  </div>
</div>

<div class="hud hud-bottom" id="hud-bottom">
  <button class="mode-btn active" data-mode="rest"><i class="fas fa-moon"></i> <span data-i18n="m_reposo">REPOSO</span></button>
  <button class="mode-btn" data-mode="analysis"><i class="fas fa-search-plus"></i> <span data-i18n="m_analisis">ANALISIS</span></button>
  <button class="mode-btn" data-mode="diagnostic"><i class="fas fa-stethoscope"></i> <span data-i18n="m_diagnostico">DIAGNOSTICO</span></button>
  <button class="mode-btn" data-mode="simulation"><i class="fas fa-play-circle"></i> <span data-i18n="m_simulacion">SIMULACION</span></button>
  <button class="mode-btn" data-mode="operation"><i class="fas fa-cog"></i> <span data-i18n="m_operacion">OPERACION</span></button>
  <button class="mode-btn" data-mode="maintenance"><i class="fas fa-tools"></i> <span data-i18n="m_mantenimiento">MANTENIMIENTO</span></button>
  <button class="mode-btn" data-mode="emergency"><i class="fas fa-exclamation-triangle"></i> <span data-i18n="m_emergencia">EMERGENCIA</span></button>
  <button class="mode-btn" data-mode="energy"><i class="fas fa-bolt"></i> <span data-i18n="m_energia">ENERGIA</span></button>
  <button class="mode-btn" data-mode="ai"><i class="fas fa-brain"></i> <span data-i18n="m_ia">IA</span></button>
  <button class="mode-btn" data-mode="hybrid"><i class="fas fa-atom"></i> <span data-i18n="m_hibrido">HIBRIDO</span></button>
</div>

<div class="cam-controls">
  <button class="cam-btn" data-cam="free" title="Vista libre"><i class="fas fa-arrows-alt"></i></button>
  <button class="cam-btn" data-cam="auto" title="Vista automatica"><i class="fas fa-sync-alt"></i></button>
  <button class="cam-btn" data-cam="explode" title="Vista explotada"><i class="fas fa-expand-arrows-alt"></i></button>
  <button class="cam-btn" data-cam="xray" title="Vista X-Ray"><i class="fas fa-x-ray"></i></button>
  <button class="cam-btn" data-cam="section" title="Vista seccionada"><i class="fas fa-cut"></i></button>
  <button class="cam-btn" data-cam="top" title="Vista superior"><i class="fas fa-arrow-down"></i></button>
</div>

<div class="info-panel" id="info-panel">
  <button class="close-btn" id="info-close"><i class="fas fa-times"></i></button>
  <h3 id="info-title"></h3>
  <div class="subtitle" id="info-subtitle"></div>
  <p id="info-desc"></p>
  <div class="stat-grid" id="info-stats"></div>
</div>

<script type="importmap">

  }
}
</script>

/* ========== TRIANGULO DINAMICO SNAPI (NUCLEO) ========== */
const triVertices = [];

const triRadius = 2.5;
for(let i=0; i<3; i++){
  const a = triAngle(i);
  triVertices.push(new THREE.Vector3(Math.cos(a)*triRadius, 0, Math.sin(a)*triRadius));
}
const pillarPositions = [];
for(let i=0; i<3; i++){
  const v = triVertices[i];
  const h = 4;
  const pGeo = new THREE.CylinderGeometry(Math.max(0.01,0.06), Math.max(0.01,0.08), h, 8);
  const pillar = new THREE.Mesh(pGeo, matTitanium);
  pillar.position.set(v.x, h/2, v.z);
  pillar.castShadow = true;
  coreGroup.add(pillar);
  const sGeo = new THREE.SphereGeometry(Math.max(0.01,0.15), 16, 16);
  const sphere = new THREE.Mesh(sGeo, matCyan);
  sphere.position.set(v.x, h, v.z);
  coreGroup.add(sphere);
  pillarPositions.push(new THREE.Vector3(v.x, h, v.z));
  const bGeo = new THREE.SphereGeometry(Math.max(0.01,0.1), 12, 12);
  const base = new THREE.Mesh(bGeo, matTitaniumLight);
  base.position.set(v.x, 0, v.z);
  coreGroup.add(base);
}
for(let i=0; i<3; i++){
  const a = pillarPositions[i];
  const b = pillarPositions[(i+1)%3];
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = Math.max(0.01, dir.length());
  const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
  const beamGeo = new THREE.CylinderGeometry(Math.max(0.01,0.03), Math.max(0.01,0.03), len, 6);
  const beam = new THREE.Mesh(beamGeo, matCyan);
  beam.position.copy(mid);
  beam.lookAt(b);
  beam.rotateX(Math.PI/2);
  coreGroup.add(beam);
}

  const x = Math.cos(angle)*phaseRadius;
  const z = Math.sin(angle)*phaseRadius;
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.userData = { index:i, angle, basePos:new THREE.Vector3(x,0,z) };

  const baseGeo = new THREE.CylinderGeometry(Math.max(0.01,1.0), Math.max(0.01,1.2), 0.15, 6+i*2);
  const base = new THREE.Mesh(baseGeo, matTitanium);

  const bRing = new THREE.Mesh(bRingGeo, matCyan.clone());

      const geo = new THREE.IcosahedronGeometry(Math.max(0.01,0.6), 1);

        rr.rotation.x = Math.PI/3*r;

        group.add(rr);
        coreEl.userData = coreEl.userData || {};
        if(!coreEl.userData.rings) coreEl.userData.rings = [];
        coreEl.userData.rings.push(rr);
      }
      break;
    }
    case 1: {
      const geo = new THREE.OctahedronGeometry(Math.max(0.01,0.5), 0);
      coreEl = new THREE.Mesh(geo, matCyan);
      coreEl.position.y = 1.2;
      group.add(coreEl);
      const orbitals = [];
      for(let o=0; o<4; o++){
        const oGeo = new THREE.BoxGeometry(Math.max(0.01,0.12), Math.max(0.01,0.12), Math.max(0.01,0.12));
        const oMesh = new THREE.Mesh(oGeo, matCyanBright);
        oMesh.position.y = 1.2;
        group.add(oMesh);
        orbitals.push(oMesh);
      }
      coreEl.userData.orbitals = orbitals;
      break;
    }
    case 2: {
      const geo = new THREE.CylinderGeometry(Math.max(0.01,0.4), Math.max(0.01,0.4), 0.8, 8);
      coreEl = new THREE.Mesh(geo, matTitaniumLight);
      coreEl.position.y = 1.0;
      group.add(coreEl);
      const segs = [];
      for(let s=0; s<3; s++){
        const sGeo = new THREE.TorusGeometry(Math.max(0.01,0.5+s*0.15), Math.max(0.001,0.03), 6, 16);
        const sMesh = new THREE.Mesh(sGeo, matCyan.clone());
        sMesh.material.transparent = true; sMesh.material.opacity = 0.5;
        sMesh.position.y = 0.8+s*0.3;
        sMesh.rotation.x = Math.PI/2;
        group.add(sMesh);
        segs.push(sMesh);
      }
      coreEl.userData.segs = segs;
      break;
    }
    case 3: {
      const geo = new THREE.OctahedronGeometry(Math.max(0.01,0.55), 0);
      coreEl = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({ color:ACCENT_HEX, metalness:0.9, roughness:0.05, emissive:ACCENT_HEX, emissiveIntensity:0.6, clearcoat:1.0 }));
      coreEl.position.y = 1.3;
      coreEl.rotation.y = Math.PI/4;
      group.add(coreEl);
      break;
    }
    case 4: {
      coreEl = new THREE.Group();
      coreEl.position.y = 0.2;
      for(let s=0; s<4; s++){
        const sGeo = new THREE.CylinderGeometry(Math.max(0.01,0.5-s*0.1), Math.max(0.01,0.55-s*0.1), 0.25, 4);
        const sMesh = new THREE.Mesh(sGeo, s%2===0 ? matTitanium : matTitaniumLight);
        sMesh.position.y = s*0.3;
        sMesh.rotation.y = Math.PI/4;
        sMesh.castShadow = true;
        coreEl.add(sMesh);
      }
      group.add(coreEl);
      const crownGeo = new THREE.SphereGeometry(Math.max(0.01,0.15), 12, 12);
      const crown = new THREE.Mesh(crownGeo, matCyanBright);
      crown.position.y = 1.5;
      group.add(crown);
      break;
    }
  }

  const labelPos = new THREE.Vector3(0, 2.5, 0);
  const phaseKeys = ['ph1','ph2','ph3','ph4','ph5'];
  const label = makeLabel(t(phaseKeys[i]), labelPos);
  group.add(label);
  group.userData.label = label;
  group.userData.labelKey = phaseKeys[i];

  phasesGroup.add(group);
  phaseModules.push(group);
}

function focusPhase(idx){

function animateCamera(targetPos, targetLookAt){
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 1200;
  const startTime = Date.now();
  function step(){
    const elapsed = Date.now() - startTime;
    const tt = Math.min(1, elapsed/duration);
    const ease = tt<0.5 ? 4*tt*tt*tt : 1-Math.pow(-2*tt+2,3)/2;
    camera.position.lerpVectors(startPos, targetPos, ease);
    controls.target.lerpVectors(startTarget, targetLookAt, ease);
    if(tt<1) requestAnimationFrame(step);
  }
  step();
}

document.querySelectorAll('.cam-btn').forEach(btn => {

    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));

    switch(mode){

      case 'auto': autoRotate = true; controls.enabled = true; resetModulePositions(); resetMaterials(); break;
      case 'explode': explodeModules(); resetMaterials(); break;
      case 'xray': xrayMode = true; resetModulePositions(); applyXRay(); break;
      case 'section': sectionMode = true; resetModulePositions(); resetMaterials(); break;
      case 'top': animateCamera(new THREE.Vector3(0, 25, 0.1), new THREE.Vector3(0,0,0)); resetModulePositions(); resetMaterials(); break;
    }
  });
});

function explodeModules(){
  phaseModules.forEach((m) => {
    const dir = m.userData.basePos.clone().normalize();
    const target = m.userData.basePos.clone().add(dir.multiplyScalar(4));
    const start = m.position.clone();
    const st = Date.now();
    function step(){
      const el = Date.now()-st;
      const p = Math.min(1, el/800);
      const e = p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
      m.position.lerpVectors(start, target, e);
      if(p<1) requestAnimationFrame(step);
    }
    step();
  });
}
function resetModulePositions(){
  phaseModules.forEach(m => {
    const start = m.position.clone();
    const target = m.userData.basePos.clone();
    const st = Date.now();
    function step(){
      const el = Date.now()-st;
      const p = Math.min(1, el/800);
      const e = p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
      m.position.lerpVectors(start, target, e);
      if(p<1) requestAnimationFrame(step);
    }
    step();
  });
}
function applyXRay(){
  allMaterials.forEach(m => {
    if(m === matEmissive) return;
    m.transparent = true;
    m.opacity = 0.15;
    m.wireframe = true;
  });
  coreSphereMat.opacity = 0.1;
}
function resetMaterials(){
  allMaterials.forEach(m => {
    m.opacity = origOpacity.get(m) || 1;
    m.wireframe = false;
    m.transparent = origOpacity.get(m) < 1;
  });
  coreSphereMat.opacity = 0.5;
}

/* ========== BUCLE DE ANIMACION ========== */
const clock = new THREE.Clock();
let simTime = 0;
let diagPhase = 0;
let diagTimer = 0;

function animate(){
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();
  const cfg = modeConfigs[currentMode];
  const speed = cfg.speed;
  simTime += delta * speed;

  if(autoRotate){
    const r = camera.position.length();
    const a = elapsed * 0.15;
    camera.position.x = Math.cos(a)*r*0.7;
    camera.position.z = Math.sin(a)*r*0.7;
    camera.position.y = 8 + Math.sin(elapsed*0.1)*2;
    controls.target.set(0, 1.5, 0);
  }

  coreSphere.rotation.y = elapsed * 0.3 * speed;
  coreSphere.rotation.x = Math.sin(elapsed * 0.2) * 0.2;
  coreRings.forEach((r, i) => {
    r.rotation.y = elapsed * (0.2+i*0.15) * speed;
    r.rotation.z += delta * 0.1 * (i+1) * speed;
  });
  const pulse = 1 + Math.sin(elapsed*2*speed)*0.05;
  coreSphere.scale.setScalar(pulse);

  phaseModules.forEach((m, i) => {
    const children = m.children;
    children.forEach(c => {
      if(c.geometry && c.geometry.type.includes('Icosahedron') && i===0){
        c.rotation.y = elapsed * 0.5 * speed;
        if(c.userData.rings) c.userData.rings.forEach((r,ri) => { r.rotation.z = elapsed*(0.3+ri*0.2)*speed; r.rotation.x = Math.PI/3*ri + elapsed*0.1*speed; });
      }
      if(c.geometry && c.geometry.type.includes('Octahedron') && i===1){
        c.rotation.y = elapsed * 0.8 * speed;
        c.rotation.x = elapsed * 0.3 * speed;
        if(c.userData.orbitals) c.userData.orbitals.forEach((o,oi) => {
          const oa = elapsed*(1+oi*0.3)*speed + oi*Math.PI/2;
          o.position.x = Math.cos(oa)*0.8;
          o.position.z = Math.sin(oa)*0.8;
          o.position.y = 1.2 + Math.sin(oa*2)*0.2;
          o.rotation.x = elapsed*2*speed;
          o.rotation.y = elapsed*3*speed;
        });
      }
      if(c.geometry && c.geometry.type.includes('Cylinder') && i===2 && c.userData.segs){
        c.rotation.y = elapsed * 0.6 * speed;
        c.userData.segs.forEach((s,si) => { s.rotation.z = elapsed*(0.5+si*0.3)*speed; });
      }
      if(c.geometry && c.geometry.type.includes('Octahedron') && i===3){
        c.rotation.y = elapsed * 1.2 * speed;
        const dp = 1 + Math.sin(elapsed*3*speed)*0.1;
        c.scale.setScalar(dp);
      }
    });
    if(i===4){
      const coreGrp = children.find(c => c.isGroup);
      if(coreGrp) coreGrp.rotation.y = elapsed * 0.4 * speed;
    }
    const isHovered = hoveredPhase === i;
    const targetScaleY = isHovered ? 1.05 : 1;
    m.scale.y += (targetScaleY - m.scale.y) * 0.1;
  });

  flowParticles.forEach(p => {
    p.userData.offset = (p.userData.offset + delta * p.userData.speed * cfg.particleSpeed) % 1;
    const pos = p.userData.curve.getPoint(p.userData.offset);
    p.position.copy(pos);
    p.material.opacity = 0.3 + Math.sin(p.userData.offset * Math.PI) * 0.7;
  });

  const pArr = ambientParticles.geometry.attributes.position.array;
  for(let i=0; i<particleCount; i++){
    pArr[i*3] += pVelocities[i*3] * cfg.particleSpeed;
    pArr[i*3+1] += pVelocities[i*3+1] * cfg.particleSpeed;
    pArr[i*3+2] += pVelocities[i*3+2] * cfg.particleSpeed;
    if(pArr[i*3+1] > 12){ pArr[i*3+1] = 0; pArr[i*3] = (Math.random()-0.5)*30; pArr[i*3+2] = (Math.random()-0.5)*30; }
  }
  ambientParticles.geometry.attributes.position.needsUpdate = true;
  ambientParticles.material.opacity = 0.2 + cfg.particleSpeed * 0.2;

  aiNodes.forEach(n => {
    const ud = n.userData;
    if(ud.active){
      const fire = ((elapsed * speed) % (ud.fireTime + ud.fireDuration));
      if(fire < ud.fireDuration){
        n.material.opacity = 0.6 + Math.sin(fire/ud.fireDuration*Math.PI)*0.4;
        n.scale.setScalar(1 + Math.sin(fire/ud.fireDuration*Math.PI)*0.5);
      } else {
        n.material.opacity = 0.3;
        n.scale.setScalar(1);
      }
    }
  });
  aiDataParticles.forEach(dp => {
    dp.material.opacity = 0.6 + Math.sin(elapsed*4*speed)*0.4;
  });
  aiConnections.forEach(c => {
    c.dataParticle.t = (c.dataParticle.t + delta * 0.3 * cfg.particleSpeed) % 1;
    const a = aiNodes[c.i].position;
    const b = aiNodes[c.j].position;
    c.dataParticle.mesh.position.lerpVectors(a, b, c.dataParticle.t);
    c.line.material.opacity = 0.05 + Math.sin(elapsed*2 + c.i)*0.05;
  });
  aiGroup.rotation.y = elapsed * 0.05 * speed;

  if(currentMode === 'diagnostic'){
    diagTimer += delta;
    if(diagTimer > 1.5){ diagTimer = 0; diagPhase = (diagPhase+1)%5; }
    phaseModules.forEach((m, i) => {
      const isDiag = i === diagPhase;
      m.children.forEach(c => {
        if(c.material && c.material.emissiveIntensity !== undefined && c !== m.userData.label){
          const target = isDiag ? 1.0 : 0.15;
          c.material.emissiveIntensity += (target - c.material.emissiveIntensity) * 0.1;
        }
      });
    });
  }

  if(currentMode === 'simulation'){
    const simPhase = Math.floor((simTime * 0.3) % 5);
    phaseModules.forEach((m, i) => {
      const active = i <= simPhase;
      m.children.forEach(c => {
        if(c.material && c.material.emissiveIntensity !== undefined && c !== m.userData.label){
          const target = active ? 0.8 : 0.1;
          c.material.emissiveIntensity += (target - c.material.emissiveIntensity) * 0.08;
        }
      });
    });
  }

  if(currentMode === 'emergency'){
    const ep = Math.sin(elapsed * 6);
    accentLight1.intensity = 2.5 + ep * 2;
    accentLight1.color.setHex(ep > 0 ? 0xFF5252 : 0x440000);
  } else {
    accentLight1.intensity += (2.5 - accentLight1.intensity) * 0.05;
  }

  if(currentMode === 'energy'){
    pMat.size = 0.08 + Math.sin(elapsed*3)*0.04;
    accentLight1.intensity = 3.5 + Math.sin(elapsed*2)*1.5;
  } else {
    pMat.size += (0.06 - pMat.size) * 0.05;
  }

  if(currentMode === 'ai'){
    aiGroup.position.y = 3 + Math.sin(elapsed*0.5)*0.5;
    aiNodes.forEach(n => { n.userData.active = true; });
    aiGroup.children.forEach(c => {
      if(c.material && c.material.opacity !== undefined) c.material.opacity = Math.min(1, (c.material.opacity||0) + 0.02);
    });
  } else {
    aiGroup.position.y += (0 - aiGroup.position.y) * 0.05;
  }

  if(sectionMode){
    renderer.clippingPlanes = [clippingPlane];
    clippingPlane.constant = Math.sin(elapsed*0.5)*5;
  } else {
    renderer.clippingPlanes = [];
  }

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(phasesGroup.children, true);
  let newHovered = -1;
  if(intersects.length > 0){
    let obj = intersects[0].object;
    while(obj.parent && obj.parent !== phasesGroup) obj = obj.parent;
    if(obj.userData && obj.userData.index !== undefined) newHovered = obj.userData.index;
  }
  if(newHovered !== hoveredPhase){
    hoveredPhase = newHovered;
    renderer.domElement.style.cursor = hoveredPhase >= 0 ? 'pointer' : 'default';
  }

  if(Math.floor(elapsed*2) % 2 === 0){
    const coreE = 90+Math.sin(elapsed)*8;
    const aiE = 70+Math.sin(elapsed*0.7)*15;
    const phE = 85+Math.sin(elapsed*1.3)*10;
    document.getElementById('nrg-core').textContent = Math.round(coreE)+'%';
    document.getElementById('nrg-core-bar').style.width = coreE+'%';
    document.getElementById('nrg-ai').textContent = Math.round(aiE)+'%';
    document.getElementById('nrg-ai-bar').style.width = aiE+'%';
    document.getElementById('nrg-phases').textContent = Math.round(phE)+'%';
    document.getElementById('nrg-phases-bar').style.width = phE+'%';
  }

  controls.update();
  composer.render();
}

/* ========== RESIZE ========== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

/* ========== INICIO ========== */
animate();
toast(t('toast_click'), 'ok');

</script>
</body>
</html>
