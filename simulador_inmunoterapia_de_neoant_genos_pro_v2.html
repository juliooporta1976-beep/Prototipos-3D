<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador Pro: Inmunoterapia de Neoantígenos - Dr. Julio César Oporta Barrera</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap');
    body { background: #020408; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
    .glass { background: rgba(5, 10, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 240, 255, 0.15); }
    .title-font { font-family: 'Orbitron', sans-serif; }
    .mono-font { font-family: 'Share Tech Mono', monospace; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <div class="absolute top-6 left-6 z-20 flex gap-2">
    <button onclick="changeLang('es')" class="text-[9px] px-3 py-1.5 glass rounded hover:text-[#00f0ff] uppercase tracking-widest transition-all">ES</button>
    <button onclick="changeLang('en')" class="text-[9px] px-3 py-1.5 glass rounded hover:text-[#00f0ff] uppercase tracking-widest transition-all">EN</button>
    <button onclick="changeLang('zh')" class="text-[9px] px-3 py-1.5 glass rounded hover:text-[#00f0ff] uppercase tracking-widest transition-all">中文</button>
  </div>

  <div class="absolute top-6 right-6 z-20 w-[400px] flex flex-col gap-4">
    <div class="p-6 glass rounded-2xl">
      <h1 class="title-font text-xs font-black text-[#00f0ff] uppercase tracking-wider" id="title-main">Simulador de Inmunoterapia</h1>
      <p class="text-[10px] text-slate-400 mt-1 uppercase" id="subtitle-author">Dr. Julio César Oporta Barrera</p>
      
      <div class="mt-6 flex flex-col gap-2" id="phase-container"></div>
    </div>

    <div class="p-6 glass rounded-2xl">
      <h2 class="title-font text-[10px] text-[#00f0ff] mb-4">TELEMETRÍA DE PROCESO</h2>
      <div id="telemetry-log" class="h-[150px] overflow-y-auto mono-font text-[9px] text-green-400 space-y-1 scrollbar-hide"></div>
    </div>
  </div>

  <div class="absolute bottom-6 left-6 z-20 p-6 glass rounded-2xl w-[300px]">
    <h2 class="title-font text-[10px] text-[#00f0ff] mb-4">PARÁMETROS DE SIMULACIÓN</h2>
    <label class="text-[9px] uppercase text-slate-400">Intensidad de Pulsación</label>
    <input type="range" id="pulse-slider" min="1" max="100" value="50" class="w-full mb-4 accent-[#00f0ff]">
    <label class="text-[9px] uppercase text-slate-400">Complejidad de Datos</label>
    <input type="range" id="complexity-slider" min="1" max="10" value="3" class="w-full accent-[#00f0ff]">
  </div>

  <div id="three-container" class="absolute inset-0 z-0"></div>

  <script>
    const translations = {
      es: { title: "Inmunoterapia de Neoantígenos", author: "Dr. Julio César Oporta Barrera", phases: ["Análisis Paciente", "Secuenciación", "Neoantígenos", "Síntesis", "Formulación", "Infusión", "Respuesta", "Optimización"] },
      en: { title: "Neoantigen Immunotherapy", author: "Dr. Julio César Oporta Barrera", phases: ["Patient Analysis", "Sequencing", "Neoantigen ID", "Synthesis", "Formulation", "Infusion", "Immune Response", "Optimization"] },
      zh: { title: "新抗原免疫疗法", author: "朱利奥·塞萨尔·奥波尔塔·巴雷拉博士", phases: ["患者分析", "基因测序", "新抗原识别", "合成阶段", "制剂阶段", "给药", "免疫反应", "优化"] }
    };

    let scene, camera, renderer, object;
    let currentPhase = 0;
    let currentLang = 'es';
    const telemetry = document.getElementById('telemetry-log');

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({antialias:true, alpha: true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('three-container').appendChild(renderer.domElement);

      const light = new THREE.SpotLight(0xffffff, 2);
      light.position.set(10, 20, 10);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x404040));

      setPhase(0); // Inicia fase inicial
      camera.position.z = 5;
      updateUI();
      animate();
    }

    function setPhase(p) {
      currentPhase = p;
      if(object) scene.remove(object);
      
      const geometries = [
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.DodecahedronGeometry(1.2),
        new THREE.IcosahedronGeometry(1.3),
        new THREE.TorusKnotGeometry(0.8, 0.2, 128, 16),
        new THREE.OctahedronGeometry(1.2),
        new THREE.SphereGeometry(0.8, 16, 16),
        new THREE.TorusKnotGeometry(1, 0.4, 64, 8),
        new THREE.BoxGeometry(1.5, 1.5, 1.5)
      ];

      const colors = [0x00f0ff, 0x00ffaa, 0xffff00, 0xffaa00, 0xff0055, 0xaa00ff, 0x0055ff, 0xffffff];
      
      const material = new THREE.MeshPhongMaterial({ color: colors[p], wireframe: true, transparent: true, opacity: 0.8 });
      object = new THREE.Mesh(geometries[p], material);
      scene.add(object);
      
      addLog(`Cambiando a Fase ${p + 1}... Procesando datos genómicos...`);
      updateUI();
    }

    function addLog(msg) {
      const p = document.createElement('p');
      p.innerText = `> ${msg}`;
      telemetry.prepend(p);
      if(telemetry.children.length > 10) telemetry.removeChild(telemetry.lastChild);
    }

    function updateUI() {
      const container = document.getElementById('phase-container');
      container.innerHTML = '';
      translations[currentLang].phases.forEach((phase, index) => {
        const btn = document.createElement('button');
        btn.className = `w-full text-left py-2 px-3 rounded text-[9px] border transition ${index === currentPhase ? 'bg-[#00f0ff]/10 border-[#00f0ff] text-[#00f0ff]' : 'border-transparent text-slate-500 hover:bg-slate-800'}`;
        btn.innerText = `0${index + 1} // ${phase}`;
        btn.onclick = () => setPhase(index);
        container.appendChild(btn);
      });
      document.getElementById('title-main').innerText = translations[currentLang].title;
      document.getElementById('subtitle-author').innerText = translations[currentLang].author;
    }

    function changeLang(lang) {
      currentLang = lang;
      updateUI();
    }

    function animate() {
      requestAnimationFrame(animate);
      if(object) {
        const pulse = document.getElementById('pulse-slider').value / 50;
        object.rotation.x += 0.005 * pulse;
        object.rotation.y += 0.01 * pulse;
        object.scale.set(1 + Math.sin(Date.now() * 0.002) * 0.1, 1 + Math.sin(Date.now() * 0.002) * 0.1, 1 + Math.sin(Date.now() * 0.002) * 0.1);
      }
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
