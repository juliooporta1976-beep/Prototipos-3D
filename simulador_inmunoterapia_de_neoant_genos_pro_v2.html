<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador 3D: Inmunoterapia de Neoantígenos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap');
        body { background: #010204; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; padding: 0; }
        .glass { background: rgba(5, 10, 20, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.2); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .mono-font { font-family: 'Share Tech Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Animaciones UI */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Capa de renderizado 3D -->
    <div id="webgl-container"></div>

    <!-- UI Overlay -->
    <div class="ui-layer w-full h-full p-6 flex flex-col justify-between">
        
        <!-- Top Bar -->
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <h1 class="title-font text-xl md:text-2xl font-black text-[#00f0ff] uppercase tracking-wider drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]" id="brand-name">
                    Dr. Julio César Oporta Barrera
                </h1>
                <p class="mono-font text-xs text-green-400 tracking-widest uppercase" id="project-title">Sistema Autónomo de Inmunoterapia</p>
                
                <div class="flex gap-2 mt-2 pointer-events-auto">
                    <button onclick="setLang('es')" class="text-[10px] px-3 py-1 glass rounded hover:bg-[#00f0ff]/20 text-white transition">ES</button>
                    <button onclick="setLang('en')" class="text-[10px] px-3 py-1 glass rounded hover:bg-[#00f0ff]/20 text-white transition">EN</button>
                    <button onclick="setLang('zh')" class="text-[10px] px-3 py-1 glass rounded hover:bg-[#00f0ff]/20 text-white transition">中文</button>
                </div>
            </div>

            <div class="glass p-4 rounded-xl w-[300px] pointer-events-auto fade-in">
                <h2 class="title-font text-sm text-white mb-2 uppercase" id="phase-title">Fase 1: Biopsia</h2>
                <p class="text-xs text-slate-300 mb-4 h-[60px] overflow-y-auto scrollbar-hide" id="phase-desc">Extracción de tejido tumoral y sangre periférica para análisis genómico.</p>
                
                <div class="space-y-2" id="phase-buttons">
                    <!-- Botones generados dinámicamente -->
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="flex justify-between items-end">
            <div class="glass p-4 rounded-xl w-[300px] pointer-events-auto">
                <h3 class="title-font text-[10px] text-[#00f0ff] mb-2 uppercase" id="controls-title">Controles de Simulación 3D</h3>
                <label class="text-[10px] text-slate-400 uppercase flex justify-between">
                    <span id="lbl-speed">Velocidad Cinética</span>
                    <span id="val-speed" class="text-white">1.0x</span>
                </label>
                <input type="range" id="speed-slider" min="0" max="300" value="100" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer mb-3 accent-[#00f0ff]">
                
                <div class="flex gap-2 mt-4">
                    <button id="btn-simulate" onclick="triggerSimulationEvent()" class="w-full py-2 bg-[#00f0ff]/20 border border-[#00f0ff] text-[#00f0ff] rounded hover:bg-[#00f0ff] hover:text-black transition-all title-font text-xs uppercase font-bold tracking-wider">
                        Ejecutar Simulación
                    </button>
                </div>
            </div>

            <div class="glass p-4 rounded-xl w-[350px] pointer-events-auto">
                <h3 class="title-font text-[10px] text-green-400 mb-2 uppercase">Telemetría Celular / Logs</h3>
                <div id="telemetry" class="h-[100px] overflow-y-auto mono-font text-[10px] text-slate-300 space-y-1 scrollbar-hide flex flex-col-reverse">
                    <!-- Logs -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // DICCIONARIO MULTILINGÜE
        // ==========================================
        const i18n = {
            es: {
                project: "Ciclo de Inmunoterapia Personalizada de Neoantígenos",
                controls: "Controles de Simulación 3D",
                speed: "Actividad Celular",
                simulate: "Ejecutar Simulación",
                phases: [
                    { t: "Fase 1: Biopsia Tumoral", d: "Extracción 3D de tejido tumoral y muestras de sangre periférica." },
                    { t: "Fase 2: Secuenciación Genómica", d: "Secuenciación profunda del ADN (WES/WGS) separando variantes germinales." },
                    { t: "Fase 3: Plataforma IA", d: "Identificación de neoantígenos mediante algoritmos y redes neuronales." },
                    { t: "Fase 4: Síntesis Biológica", d: "Diseño bioinformático y síntesis de cadenas de ARNm o péptidos." },
                    { t: "Fase 5: Bioreactor / Formulación", d: "Encapsulación en nanopartículas lipídicas dentro de bioreactores." },
                    { t: "Fase 6: Administración", d: "Infusión del vial de vacuna personalizada en el torrente sanguíneo." },
                    { t: "Fase 7: Respuesta Inmune", d: "Los linfocitos T identifican y atacan destructivamente la célula cancerosa." },
                    { t: "Fase 8: Optimización", d: "Análisis de escape inmunológico y calibración continua del modelo." }
                ],
                logs: {
                    init: "Sistema 3D inicializado...",
                    phase: "Iniciando análisis volumétrico de Fase",
                    sim: "Simulación dinámica activada. Calculando vectores..."
                }
            },
            en: {
                project: "Personalized Neoantigen Immunotherapy Cycle",
                controls: "3D Simulation Controls",
                speed: "Cellular Activity",
                simulate: "Run Simulation",
                phases: [
                    { t: "Phase 1: Tumor Biopsy", d: "3D extraction of tumor tissue and peripheral blood samples." },
                    { t: "Phase 2: Genomic Sequencing", d: "Deep DNA sequencing (WES/WGS) separating germline variants." },
                    { t: "Phase 3: AI Platform", d: "Neoantigen identification using AI algorithms and neural networks." },
                    { t: "Phase 4: Biological Synthesis", d: "Bioinformatic design and synthesis of mRNA chains or peptides." },
                    { t: "Phase 5: Bioreactor / Formulation", d: "Encapsulation into lipid nanoparticles inside bioreactors." },
                    { t: "Phase 6: Administration", d: "Infusion of the personalized vaccine vial into the bloodstream." },
                    { t: "Phase 7: Immune Response", d: "T-lymphocytes identify and destructively attack the cancer cell." },
                    { t: "Phase 8: Optimization", d: "Analysis of immune escape and continuous model calibration." }
                ],
                logs: {
                    init: "3D System initialized...",
                    phase: "Starting volumetric analysis of Phase",
                    sim: "Dynamic simulation activated. Calculating vectors..."
                }
            },
            zh: {
                project: "个性化新抗原免疫治疗周期",
                controls: "3D 模拟控制",
                speed: "细胞活性",
                simulate: "运行模拟",
                phases: [
                    { t: "第一阶段：肿瘤活检", d: "肿瘤组织和外周血样本的 3D 提取。" },
                    { t: "第二阶段：基因测序", d: "深度 DNA 测序 (WES/WGS) 分离生殖细胞变异。" },
                    { t: "第三阶段：AI 平台", d: "使用人工智能算法和神经网络进行新抗原识别。" },
                    { t: "第四阶段：生物合成", d: "mRNA 链或多肽的生物信息学设计和合成。" },
                    { t: "第五阶段：生物反应器/制剂", d: "在生物反应器内封装成脂质纳米颗粒。" },
                    { t: "第六阶段：给药", d: "将个性化疫苗小瓶注入血液中。" },
                    { t: "第七阶段：免疫反应", d: "T 淋巴细胞识别并破坏性地攻击癌细胞。" },
                    { t: "第八阶段：优化", d: "分析免疫逃逸并持续校准模型。" }
                ],
                logs: {
                    init: "3D 系统已初始化...",
                    phase: "开始体积分析阶段",
                    sim: "动态模拟已激活。正在计算向量..."
                }
            }
        };

        let currentLang = 'es';
        let currentPhase = 0;
        let simSpeed = 1.0;
        let isSimulating = false;

        // ==========================================
        // VARIABLES THREE.JS
        // ==========================================
        let scene, camera, renderer, controls;
        let currentGroup = new THREE.Group();
        let animationMixers = [];
        let particles = [];
        let clock = new THREE.Clock();

        // Objetos interactivos específicos
        let tumorMesh, tCellMesh, dnaGroup, vialMesh, aiCore;

        function init3D() {
            const container = document.getElementById('webgl-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010204, 0.05);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // Iluminación
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0x00f0ff, 2);
            spotLight.position.set(5, 10, 5);
            spotLight.angle = Math.PI / 4;
            spotLight.penumbra = 0.5;
            scene.add(spotLight);

            const spotLight2 = new THREE.SpotLight(0xff0055, 1.5);
            spotLight2.position.set(-5, -5, -5);
            scene.add(spotLight2);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            scene.add(currentGroup);

            window.addEventListener('resize', onWindowResize, false);
            
            buildUI();
            loadPhase(0);
            logTelemetry(i18n[currentLang].logs.init);
            
            animate();
        }

        // ==========================================
        // CONSTRUCTORES DE GEOMETRÍA (PROCEDURAL)
        // ==========================================
        
        function clearCurrentGroup() {
            while(currentGroup.children.length > 0){ 
                const obj = currentGroup.children[0];
                currentGroup.remove(obj); 
            }
            particles = [];
            isSimulating = false;
        }

        function createOrganicMaterial(colorHex) {
            return new THREE.MeshPhysicalMaterial({
                color: colorHex,
                metalness: 0.1,
                roughness: 0.4,
                transmission: 0.2, // glass-like
                thickness: 0.5,
                emissive: colorHex,
                emissiveIntensity: 0.2,
                wireframe: false
            });
        }

        // Fase 1: Biopsia (Célula Tumoral + Sangre)
        function buildPhaseBiopsy() {
            tumorMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 4),
                createOrganicMaterial(0x880022)
            );
            // Modificar vértices para hacerlo irregular
            const positions = tumorMesh.geometry.attributes.position;
            for(let i=0; i<positions.count; i++) {
                positions.setXYZ(i, 
                    positions.getX(i) * (1 + Math.random()*0.2),
                    positions.getY(i) * (1 + Math.random()*0.2),
                    positions.getZ(i) * (1 + Math.random()*0.2)
                );
            }
            tumorMesh.geometry.computeVertexNormals();
            currentGroup.add(tumorMesh);

            // Glóbulos rojos (Torus) flotando
            for(let i=0; i<15; i++) {
                const rb = new THREE.Mesh(
                    new THREE.TorusGeometry(0.3, 0.15, 16, 32),
                    createOrganicMaterial(0xff2222)
                );
                rb.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                rb.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                rb.userData = { speed: Math.random() * 0.02, axis: new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize() };
                particles.push(rb);
                currentGroup.add(rb);
            }
        }

        // Fase 2: Secuenciación Genómica (Hélice ADN)
        function buildPhaseDNA() {
            dnaGroup = new THREE.Group();
            const matBase = new THREE.MeshPhysicalMaterial({ color: 0x00f0ff, emissive: 0x0055ff, emissiveIntensity: 0.5, wireframe: true });
            const matLink = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            for(let i=0; i<40; i++) {
                const angle = i * 0.4;
                const y = (i - 20) * 0.3;
                
                const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), matBase);
                s1.position.set(Math.cos(angle)*1.5, y, Math.sin(angle)*1.5);
                
                const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), matBase);
                s2.position.set(Math.cos(angle + Math.PI)*1.5, y, Math.sin(angle + Math.PI)*1.5);

                const link = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3), matLink);
                link.position.set(0, y, 0);
                link.rotation.x = Math.PI / 2;
                link.rotation.z = -angle;

                dnaGroup.add(s1);
                dnaGroup.add(s2);
                dnaGroup.add(link);
            }
            currentGroup.add(dnaGroup);
        }

        // Fase 3: IA Plataforma
        function buildPhaseAI() {
            aiCore = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 2),
                new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true })
            );
            currentGroup.add(aiCore);

            const pGeo = new THREE.BufferGeometry();
            const pMat = new THREE.PointsMaterial({ color: 0x00ffaa, size: 0.1 });
            const pPos = [];
            for(let i=0; i<1000; i++) {
                pPos.push((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
            }
            pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPos, 3));
            const pSys = new THREE.Points(pGeo, pMat);
            currentGroup.add(pSys);
            particles.push(pSys); // Lo usamos en animate
        }

        // Fase 4 & 5: Síntesis y Biorreactor
        function buildPhaseBioreactor() {
            // Tanque de cristal
            vialMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(2, 2, 6, 32, 1, true),
                new THREE.MeshPhysicalMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, side: THREE.DoubleSide, metalness: 0.9, roughness: 0.1 })
            );
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.1, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            cap.position.y = 3.25;
            const base = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.1, 0.5, 32), new THREE.MeshStandardMaterial({color: 0x333333}));
            base.position.y = -3.25;
            
            currentGroup.add(vialMesh);
            currentGroup.add(cap);
            currentGroup.add(base);

            // Vacuna sintetizándose (partículas internas)
            for(let i=0; i<50; i++) {
                const pep = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: 0xffff00}));
                pep.position.set((Math.random()-0.5)*3, (Math.random()-0.5)*5, (Math.random()-0.5)*3);
                pep.userData = { speedY: Math.random()*0.05 + 0.01 };
                particles.push(pep);
                currentGroup.add(pep);
            }
        }

        // Fase 6: Administración (Torrente sanguíneo rápido)
        function buildPhaseInfusion() {
            const tube = new THREE.Mesh(
                new THREE.TorusGeometry(8, 2, 16, 100),
                new THREE.MeshPhysicalMaterial({ color: 0x550000, transparent: true, opacity: 0.5, side: THREE.BackSide })
            );
            currentGroup.add(tube);
            camera.position.set(0, 0, 7); // Mover cámara adentro
            
            // Nanopartículas ingresando
            for(let i=0; i<100; i++) {
                const lnp = new THREE.Mesh(new THREE.OctahedronGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00f0ff}));
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI * 2;
                lnp.position.set(Math.cos(theta)*8 + Math.cos(phi)*1.5, Math.sin(theta)*8 + Math.sin(phi)*1.5, Math.sin(phi)*1.5);
                lnp.userData = { theta: theta, phi: phi, speed: Math.random()*0.05 + 0.02 };
                particles.push(lnp);
                currentGroup.add(lnp);
            }
        }

        // Fase 7: Respuesta Inmune (T-Cell ataca Tumor)
        function buildPhaseImmune() {
            // Tumor
            tumorMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.5, 3),
                createOrganicMaterial(0x333333) // Color oscuro, moribundo
            );
            tumorMesh.position.set(3, 0, 0);
            currentGroup.add(tumorMesh);

            // T-Cell (Linfocito)
            tCellMesh = new THREE.Mesh(
                new THREE.SphereGeometry(1, 32, 32),
                createOrganicMaterial(0x00ffaa) // Inmune, brillante
            );
            // Hacerle picos al linfocito
            const pos = tCellMesh.geometry.attributes.position;
            for(let i=0; i<pos.count; i++) {
                if(Math.random() > 0.8) {
                    pos.setXYZ(i, pos.getX(i)*1.2, pos.getY(i)*1.2, pos.getZ(i)*1.2);
                }
            }
            tCellMesh.geometry.computeVertexNormals();
            tCellMesh.position.set(-4, 0, 0);
            currentGroup.add(tCellMesh);
        }

        // Fase 8: Optimización (Dato y bucle)
        function buildPhaseOpt() {
            buildPhaseAI(); // Reutiliza IA
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(3, 0.05, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x00f0ff })
            );
            currentGroup.add(ring);
            const ring2 = new THREE.Mesh(
                new THREE.TorusGeometry(4, 0.05, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0xff0055 })
            );
            ring2.rotation.x = Math.PI/2;
            currentGroup.add(ring2);
            particles.push(ring, ring2); // para rotar
        }

        // ==========================================
        // LÓGICA DE CONTROL Y UI
        // ==========================================

        function loadPhase(index) {
            currentPhase = index;
            clearCurrentGroup();
            camera.position.set(0, 2, 10); // Reset cam

            switch(index) {
                case 0: buildPhaseBiopsy(); break;
                case 1: buildPhaseDNA(); break;
                case 2: buildPhaseAI(); break;
                case 3: 
                case 4: buildPhaseBioreactor(); break;
                case 5: buildPhaseInfusion(); break;
                case 6: buildPhaseImmune(); break;
                case 7: buildPhaseOpt(); break;
            }

            updateUI();
            logTelemetry(`${i18n[currentLang].logs.phase} ${index + 1}...`);
        }

        function buildUI() {
            const btnContainer = document.getElementById('phase-buttons');
            btnContainer.innerHTML = '';
            
            i18n[currentLang].phases.forEach((p, index) => {
                const btn = document.createElement('button');
                const isActive = index === currentPhase;
                btn.className = `w-full text-left py-2 px-3 rounded text-[10px] uppercase font-bold transition-all border ${isActive ? 'bg-[#00f0ff]/20 border-[#00f0ff] text-[#00f0ff] shadow-[0_0_10px_rgba(0,240,255,0.3)]' : 'border-slate-700 text-slate-400 hover:border-slate-500 hover:text-white'}`;
                btn.innerText = `[0${index + 1}] ${p.t.split(':')[1] || p.t}`;
                btn.onclick = () => loadPhase(index);
                btnContainer.appendChild(btn);
            });

            document.getElementById('project-title').innerText = i18n[currentLang].project;
            document.getElementById('controls-title').innerText = i18n[currentLang].controls;
            document.getElementById('lbl-speed').innerText = i18n[currentLang].speed;
            document.getElementById('btn-simulate').innerText = i18n[currentLang].simulate;
        }

        function updateUI() {
            buildUI();
            const phaseData = i18n[currentLang].phases[currentPhase];
            
            const titleEl = document.getElementById('phase-title');
            const descEl = document.getElementById('phase-desc');
            
            titleEl.innerText = phaseData.t;
            descEl.innerText = phaseData.d;
            
            // Re-trigger animation
            titleEl.classList.remove('fade-in');
            descEl.classList.remove('fade-in');
            void titleEl.offsetWidth; // trigger reflow
            titleEl.classList.add('fade-in');
            descEl.classList.add('fade-in');
        }

        function setLang(lang) {
            currentLang = lang;
            updateUI();
        }

        function logTelemetry(msg) {
            const tel = document.getElementById('telemetry');
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            p.innerHTML = `<span class="text-slate-500">[${time}]</span> > ${msg}`;
            tel.prepend(p);
            if(tel.children.length > 20) tel.removeChild(tel.lastChild);
        }

        // ==========================================
        // EVENTOS DE SIMULACIÓN (BOTÓN)
        // ==========================================
        function triggerSimulationEvent() {
            isSimulating = !isSimulating;
            logTelemetry(isSimulating ? i18n[currentLang].logs.sim : "Simulación pausada.");
            
            const btn = document.getElementById('btn-simulate');
            if(isSimulating) {
                btn.classList.replace('bg-[#00f0ff]/20', 'bg-[#00f0ff]');
                btn.classList.replace('text-[#00f0ff]', 'text-black');
            } else {
                btn.classList.replace('bg-[#00f0ff]', 'bg-[#00f0ff]/20');
                btn.classList.replace('text-black', 'text-[#00f0ff]');
            }
        }

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            simSpeed = e.target.value / 100;
            document.getElementById('val-speed').innerText = simSpeed.toFixed(1) + 'x';
        });

        // ==========================================
        // RENDER LOOP & ANIMACIONES DINÁMICAS
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // Animaciones Base por Fase
            if (currentPhase === 0 && tumorMesh) {
                // Biopsia: Tumor pulsa
                const scale = 1 + Math.sin(time * 3 * simSpeed) * 0.05;
                tumorMesh.scale.set(scale, scale, scale);
                
                // Glóbulos rojos flotan
                particles.forEach(rb => {
                    rb.position.addScaledVector(rb.userData.axis, rb.userData.speed * simSpeed);
                    if(rb.position.length() > 8) rb.position.set(0,0,0);
                    rb.rotation.x += 0.01 * simSpeed;
                });
            }
            
            if (currentPhase === 1 && dnaGroup) {
                // ADN gira
                dnaGroup.rotation.y += 0.5 * delta * simSpeed;
            }

            if (currentPhase === 2 && aiCore) {
                aiCore.rotation.x += 0.5 * delta * simSpeed;
                aiCore.rotation.y += 0.8 * delta * simSpeed;
                
                // Data particles
                if(particles[0]) {
                    const pos = particles[0].geometry.attributes.position;
                    for(let i=0; i<pos.count; i++) {
                        let y = pos.getY(i) + (0.1 * simSpeed);
                        if(y > 7) y = -7;
                        pos.setY(i, y);
                    }
                    particles[0].geometry.attributes.position.needsUpdate = true;
                }
            }

            if ((currentPhase === 3 || currentPhase === 4) && vialMesh) {
                // Biorreactor
                vialMesh.rotation.y += 0.2 * delta * simSpeed;
                particles.forEach(pep => {
                    pep.position.y += pep.userData.speedY * simSpeed;
                    if(pep.position.y > 2.5) pep.position.y = -2.5;
                });
            }

            if (currentPhase === 5) {
                // Infusión (Viaje dentro del tubo)
                particles.forEach(lnp => {
                    lnp.userData.theta += lnp.userData.speed * simSpeed;
                    lnp.position.x = Math.cos(lnp.userData.theta)*8 + Math.cos(lnp.userData.phi)*1.5;
                    lnp.position.y = Math.sin(lnp.userData.theta)*8 + Math.sin(lnp.userData.phi)*1.5;
                });
            }

            if (currentPhase === 6 && tumorMesh && tCellMesh) {
                // Linfocito ataca tumor
                if(isSimulating) {
                    // Mover T-Cell hacia el tumor
                    tCellMesh.position.lerp(tumorMesh.position, 0.01 * simSpeed);
                    
                    // Si están cerca, el tumor se encoge y cambia de color (destrucción)
                    if(tCellMesh.position.distanceTo(tumorMesh.position) < 2.0) {
                        tumorMesh.scale.multiplyScalar(0.99);
                        tumorMesh.material.emissive.setHex(0xff0000);
                        if(Math.random() > 0.9) logTelemetry("Impacto citotóxico. Lisis tumoral detectada.");
                    }
                } else {
                    // Animación idle
                    tCellMesh.position.y = Math.sin(time * 2) * 0.5;
                    tumorMesh.position.y = Math.cos(time * 1.5) * 0.3;
                }
            }

            if (currentPhase === 7 && aiCore) {
                aiCore.rotation.y -= 1.0 * delta * simSpeed;
                particles[0].rotation.x += 0.5 * delta * simSpeed;
                particles[1].rotation.y += 0.5 * delta * simSpeed;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Iniciar
        window.onload = init3D;
    </script>
</body>
</html>
