<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VR NeuroRehab+ — Prototipo 3D Interactivo</title>
<style>
  :root {
    --titanium: #6B6B6B;
    --cyan: #4FC3F7;
    --silver: #B8B8B8;
    --clinical: #E8E8E8;
    --anthracite: #2D2D2D;
    --bg: #0a0e14;
    --panel: rgba(10,14,20,0.88);
    --border: rgba(79,195,247,0.2);
    --text: #d0d8e0;
    --text-bright: #f0f4f8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  #canvas-container {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index:1;
  }
  #ar-video-bg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    object-fit: cover; z-index:0; display:none;
  }
  /* Autor */
  #author-badge {
    position: fixed; top:16px; left:16px; z-index:100;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    backdrop-filter: blur(12px);
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 0.5px;
    font-weight: 600;
    pointer-events: none;
  }
  #author-badge span { color: var(--text); font-weight: 400; }
  /* Selector de idioma */
  #lang-panel {
    position: fixed; top:16px; right:16px; z-index:100;
    display: flex; gap:4px;
  }
  .lang-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    backdrop-filter: blur(12px);
    transition: all 0.3s;
  }
  .lang-btn:hover, .lang-btn.active {
    background: rgba(79,195,247,0.15);
    color: var(--cyan);
    border-color: var(--cyan);
  }
  /* Panel de control izquierdo */
  #control-panel {
    position: fixed; left:16px; top:70px; z-index:100;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    width: 220px;
    backdrop-filter: blur(14px);
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  #control-panel::-webkit-scrollbar { width:4px; }
  #control-panel::-webkit-scrollbar-thumb { background: var(--cyan); border-radius:4px; }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--cyan);
    margin-bottom: 10px;
    font-weight: 700;
  }
  .panel-section { margin-bottom: 14px; }
  .panel-section label {
    display: block;
    font-size: 11px;
    color: var(--silver);
    margin-bottom: 6px;
  }
  .sim-btn {
    display: block;
    width: 100%;
    background: rgba(79,195,247,0.06);
    border: 1px solid rgba(79,195,247,0.15);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    margin-bottom: 4px;
    text-align: left;
    transition: all 0.25s;
  }
  .sim-btn:hover { background: rgba(79,195,247,0.12); color: var(--text-bright); }
  .sim-btn.active {
    background: rgba(79,195,247,0.2);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(79,195,247,0.15);
  }
  /* Slider */
  .sim-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--anthracite);
    outline: none;
  }
  .sim-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(79,195,247,0.4);
  }
  /* HUD inferior */
  #hud-bar {
    position: fixed; bottom:0; left:0; right:0; z-index:100;
    background: linear-gradient(to top, rgba(10,14,20,0.95), transparent);
    padding: 20px 24px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }
  .hud-block { pointer-events: auto; }
  .hud-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--cyan);
    opacity: 0.7;
  }
  .hud-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    font-variant-numeric: tabular-nums;
  }
  .hud-value.cyan { color: var(--cyan); }
  .hud-group { display: flex; gap: 28px; }
  /* Botón AR */
  #ar-toggle {
    position: fixed; bottom: 70px; right: 16px; z-index: 100;
    background: linear-gradient(135deg, rgba(79,195,247,0.2), rgba(79,195,247,0.08));
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    text-transform: uppercase;
  }
  #ar-toggle:hover {
    background: linear-gradient(135deg, rgba(79,195,247,0.35), rgba(79,195,247,0.15));
    box-shadow: 0 0 20px rgba(79,195,247,0.2);
  }
  #ar-toggle.active {
    background: var(--cyan);
    color: var(--anthracite);
  }
  /* Toast */
  #toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: var(--panel);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 12px;
    backdrop-filter: blur(14px);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  /* Indicador de estado */
  #state-indicator {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    backdrop-filter: blur(12px);
    display: flex; align-items: center; gap: 8px;
  }
  #state-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--anthracite);
    transition: background 0.4s, box-shadow 0.4s;
  }
  /* Responsive */
  @media (max-width: 700px) {
    #control-panel { width: 170px; padding: 10px; left: 8px; top: 60px; }
    .sim-btn { font-size: 10px; padding: 5px 8px; }
    #author-badge { font-size: 11px; padding: 8px 12px; }
    .hud-value { font-size: 14px; }
    .hud-group { gap: 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<video id="ar-video-bg" autoplay playsinline muted></video>
<div id="canvas-container"></div>

<div id="author-badge">Dr. Julio César Oporta Barrera <span>| VR NeuroRehab+</span></div>

<div id="state-indicator">
  <div id="state-dot"></div>
  <span id="state-text" data-i18n="state_off">Apagado</span>
</div>

<div id="lang-panel">
  <button class="lang-btn active" data-lang="es">ES</button>
  <button class="lang-btn" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="zh">中</button>
</div>

<div id="control-panel">
  <div class="panel-title" data-i18n="panel_states">Estados Dinámicos</div>
  <div class="panel-section">
    <button class="sim-btn active" data-state="off" data-i18n="st_off">Apagado</button>
    <button class="sim-btn" data-state="standby" data-i18n="st_standby">Espera</button>
    <button class="sim-btn" data-state="calibration" data-i18n="st_cal">Calibración</button>
    <button class="sim-btn" data-state="therapy" data-i18n="st_therapy">Terapia Activa</button>
    <button class="sim-btn" data-state="emergency" data-i18n="st_emerg">Emergencia</button>
  </div>

  <div class="panel-title" data-i18n="panel_sims">Simulaciones</div>
  <div class="panel-section">
    <button class="sim-btn" data-sim="biomechanics" data-i18n="sim_bio">Biomecánica</button>
    <button class="sim-btn" data-sim="modular" data-i18n="sim_mod">Física Modular</button>
    <button class="sim-btn" data-sim="energy" data-i18n="sim_energy">Energía Híbrida</button>
    <button class="sim-btn" data-sim="swarm" data-i18n="sim_swarm">IA de Enjambre</button>
    <button class="sim-btn" data-sim="hud3d" data-i18n="sim_hud">HUD Táctico 3D</button>
    <button class="sim-btn" data-sim="neural" data-i18n="sim_neural">Red Neuronal</button>
  </div>

  <div class="panel-title" data-i18n="panel_params">Parámetros</div>
  <div class="panel-section">
    <label data-i18n="param_diff">Dificultad Terapéutica</label>
    <input type="range" class="sim-slider" id="diff-slider" min="1" max="10" value="5">
    <label data-i18n="param_sens" style="margin-top:8px">Sensibilidad Sensorial</label>
    <input type="range" class="sim-slider" id="sens-slider" min="1" max="10" value="7">
  </div>

  <div class="panel-section">
    <button class="sim-btn" id="btn-explode" data-i18n="sim_explode">Vista Explotada</button>
    <button class="sim-btn" id="btn-reset" data-i18n="sim_reset">Reiniciar Vista</button>
  </div>
</div>

<div id="hud-bar">
  <div class="hud-group">
    <div class="hud-block">
      <div class="hud-label" data-i18n="hud_eeg">EEG</div>
      <div class="hud-value cyan" id="hud-eeg">0.00 Hz</div>
    </div>
    <div class="hud-block">
      <div class="hud-label" data-i18n="hud_fnirs">fNIRS</div>
      <div class="hud-value" id="hud-fnirs">0.00 %</div>
    </div>
    <div class="hud-block">
      <div class="hud-label" data-i18n="hud_cognitive">Carga Cognitiva</div>
      <div class="hud-value cyan" id="hud-cog">0.0</div>
    </div>
  </div>
  <div class="hud-group">
    <div class="hud-block">
      <div class="hud-label" data-i18n="hud_session">Sesión</div>
      <div class="hud-value" id="hud-session">00:00</div>
    </div>
    <div class="hud-block">
      <div class="hud-label" data-i18n="hud_engagement">Engagement</div>
      <div class="hud-value cyan" id="hud-eng">0 %</div>
    </div>
  </div>
</div>

<button id="ar-toggle" data-i18n="btn_ar">Realidad Aumentada</button>
<div id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// SISTEMA DE TRADUCCIÓN MULTILENGUAJE
// ============================================================
const i18n = {
  es: {
    state_off: 'Apagado', state_standby: 'Espera', state_cal: 'Calibración',
    state_therapy: 'Terapia Activa', state_emerg: 'Emergencia',
    panel_states: 'Estados Dinámicos', panel_sims: 'Simulaciones', panel_params: 'Parámetros',
    st_off: 'Apagado', st_standby: 'Espera', st_cal: 'Calibración',
    st_therapy: 'Terapia Activa', st_emerg: 'Emergencia',
    sim_bio: 'Biomecánica', sim_mod: 'Física Modular', sim_energy: 'Energía Híbrida',
    sim_swarm: 'IA de Enjambre', sim_hud: 'HUD Táctico 3D', sim_neural: 'Red Neuronal',
    param_diff: 'Dificultad Terapéutica', param_sens: 'Sensibilidad Sensorial',
    sim_explode: 'Vista Explotada', sim_reset: 'Reiniciar Vista',
    hud_eeg: 'EEG', hud_fnirs: 'fNIRS', hud_cognitive: 'Carga Cognitiva',
    hud_session: 'Sesión', hud_engagement: 'Engagement',
    btn_ar: 'Realidad Aumentada',
    toast_ar_on: 'Realidad Aumentada activada', toast_ar_off: 'Realidad Aumentada desactivada',
    toast_state: 'Estado: ', toast_sim: 'Simulación: '
  },
  en: {
    state_off: 'Off', state_standby: 'Standby', state_cal: 'Calibration',
    state_therapy: 'Active Therapy', state_emerg: 'Emergency',
    panel_states: 'Dynamic States', panel_sims: 'Simulations', panel_params: 'Parameters',
    st_off: 'Off', st_standby: 'Standby', st_cal: 'Calibration',
    st_therapy: 'Active Therapy', st_emerg: 'Emergency',
    sim_bio: 'Biomechanics', sim_mod: 'Modular Physics', sim_energy: 'Hybrid Energy',
    sim_swarm: 'Swarm AI', sim_hud: 'Tactical 3D HUD', sim_neural: 'Neural Network',
    param_diff: 'Therapeutic Difficulty', param_sens: 'Sensory Sensitivity',
    sim_explode: 'Exploded View', sim_reset: 'Reset View',
    hud_eeg: 'EEG', hud_fnirs: 'fNIRS', hud_cognitive: 'Cognitive Load',
    hud_session: 'Session', hud_engagement: 'Engagement',
    btn_ar: 'Augmented Reality',
    toast_ar_on: 'Augmented Reality enabled', toast_ar_off: 'Augmented Reality disabled',
    toast_state: 'State: ', toast_sim: 'Simulation: '
  },
  zh: {
    state_off: '关闭', state_standby: '待机', state_cal: '校准',
    state_therapy: '主动治疗', state_emerg: '紧急',
    panel_states: '动态状态', panel_sims: '模拟系统', panel_params: '参数设置',
    st_off: '关闭', st_standby: '待机', st_cal: '校准',
    st_therapy: '主动治疗', st_emerg: '紧急',
    sim_bio: '生物力学', sim_mod: '模块化物理', sim_energy: '混合能量',
    sim_swarm: '群体智能', sim_hud: '战术3D抬头显示', sim_neural: '神经网络',
    param_diff: '治疗难度', param_sens: '感官灵敏度',
    sim_explode: '爆炸视图', sim_reset: '重置视图',
    hud_eeg: '脑电', hud_fnirs: '近红外', hud_cognitive: '认知负荷',
    hud_session: '会话', hud_engagement: '参与度',
    btn_ar: '增强现实',
    toast_ar_on: '增强现实已启用', toast_ar_off: '增强现实已禁用',
    toast_state: '状态：', toast_sim: '模拟：'
  }
};
let currentLang = 'es';

function applyLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

// ============================================================
// TOAST NOTIFICACIONES
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// VARIABLES GLOBALES
// ============================================================
let currentState = 'off';
let currentSim = null;
let isExploded = false;
let isAR = false;
let sessionTime = 0;
let sessionInterval = null;
const clock = new THREE.Clock();
const diffSlider = document.getElementById('diff-slider');
const sensSlider = document.getElementById('sens-slider');

// Grupos de objetos
const headsetGroup = new THREE.Group();
const sensorBandGroup = new THREE.Group();
const processingUnitGroup = new THREE.Group();
const cableGroup = new THREE.Group();
const aiNodesGroup = new THREE.Group();
const energyGroup = new THREE.Group();
const hud3dGroup = new THREE.Group();
const swarmGroup = new THREE.Group();
const neuralGroup = new THREE.Group();

// Referencias a materiales que cambian con estados
let ledMaterials = [];
let electrodeMaterials = [];
let mainBodyMat, frontMat, lensMat, paddingMat, darkMat, metalMat, cableMat;

// Posiciones originales para vista explotada
const originalPositions = new Map();

// ============================================================
// ESCENA, CÁMARA, RENDERIZADOR
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0e14, 0.15);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0.35, 0.25, 0.55);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.15;
controls.maxDistance = 2.0;
controls.target.set(0, 0.02, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// ============================================================
// ILUMINACIÓN CINEMATOGRÁFICA
// ============================================================
// Luz clave principal (lateral derecha, cálida-suave)
const keyLight = new THREE.DirectionalLight(0xffeedd, 2.5);
keyLight.position.set(1.5, 1.2, 1.0);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 5;
keyLight.shadow.camera.left = -0.5;
keyLight.shadow.camera.right = 0.5;
keyLight.shadow.camera.top = 0.5;
keyLight.shadow.camera.bottom = -0.5;
keyLight.shadow.bias = -0.0002;
scene.add(keyLight);

// Luz de relleno (izquierda, fría-suave)
const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
fillLight.position.set(-1.0, 0.8, -0.5);
scene.add(fillLight);

// Luz de contorno (detrás, acento cian)
const rimLight = new THREE.DirectionalLight(0x4FC3F7, 1.2);
rimLight.position.set(-0.3, 0.5, -1.0);
scene.add(rimLight);

// Luz ambiente muy suave
const ambLight = new THREE.AmbientLight(0x1a2030, 0.6);
scene.add(ambLight);

// Luz de acento inferior (reflejo de superficie)
const bottomLight = new THREE.PointLight(0x4FC3F7, 0.3, 1.5);
bottomLight.position.set(0, -0.3, 0);
scene.add(bottomLight);

// Spotlight superior para dramatismo
const spotLight = new THREE.SpotLight(0xffffff, 1.5, 3, Math.PI / 6, 0.5, 1);
spotLight.position.set(0, 1.5, 0);
spotLight.target.position.set(0, 0, 0);
scene.add(spotLight);
scene.add(spotLight.target);

// ============================================================
// SUELO Y ENTORNO
// ============================================================
// Placa de presentación
const floorGeom = new THREE.CircleGeometry(0.8, 64);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0d1117,
  metalness: 0.8,
  roughness: 0.3
});
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.12;
floor.receiveShadow = true;
scene.add(floor);

// Anillo de acento en el suelo
const ringGeom = new THREE.RingGeometry(0.35, 0.37, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x4FC3F7, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.119;
scene.add(ring);

// Cuadrícula sutil
const gridHelper = new THREE.PolarGridHelper(0.7, 8, 4, 64, 0x1a2a3a, 0x1a2a3a);
gridHelper.position.y = -0.118;
scene.add(gridHelper);

// Partículas ambientales
const ambientParticleCount = 200;
const apGeom = new THREE.BufferGeometry();
const apPositions = new Float32Array(ambientParticleCount * 3);
const apSizes = new Float32Array(ambientParticleCount);
for (let i = 0; i < ambientParticleCount; i++) {
  apPositions[i * 3] = (Math.random() - 0.5) * 2;
  apPositions[i * 3 + 1] = (Math.random() - 0.5) * 1.5;
  apPositions[i * 3 + 2] = (Math.random() - 0.5) * 2;
  apSizes[i] = Math.random() * 2 + 0.5;
}
apGeom.setAttribute('position', new THREE.BufferAttribute(apPositions, 3));
apGeom.setAttribute('size', new THREE.BufferAttribute(apSizes, 1));

const apMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0x4FC3F7) } },
  vertexShader: `
    attribute float size;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      pos.y += sin(uTime * 0.3 + position.x * 2.0) * 0.02;
      pos.x += cos(uTime * 0.2 + position.z * 1.5) * 0.015;
      vAlpha = 0.15 + 0.15 * sin(uTime + position.y * 3.0);
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = size * (0.15 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float alpha = vAlpha * smoothstep(0.5, 0.0, d);
      gl_FragColor = vec4(uColor, alpha);
    }
  `

// ============================================================
// FUNCIÓN AUXILIAR: CAJA REDONDEADA
// ============================================================
function createRoundedBox(w, h, d, r, seg) {
  const shape = new THREE.Shape();
  const hw = w / 2 - r, hh = h / 2 - r;
  shape.moveTo(-hw, -h / 2);
  shape.lineTo(hw, -h / 2);
  shape.quadraticCurveTo(w / 2, -h / 2, w / 2, -hh);
  shape.lineTo(w / 2, hh);
  shape.quadraticCurveTo(w / 2, h / 2, hw, h / 2);
  shape.lineTo(-hw, h / 2);
  shape.quadraticCurveTo(-w / 2, h / 2, -w / 2, hh);
  shape.lineTo(-w / 2, -hh);
  shape.quadraticCurveTo(-w / 2, -h / 2, -hw, -h / 2);

  const bevelR = Math.max(0.001, r * 0.25);
  const geom = new THREE.ExtrudeGeometry(shape, {
    depth: d,
    bevelEnabled: true,
    bevelThickness: bevelR,
    bevelSize: bevelR,
    bevelSegments: seg || 3
  });
  geom.translate(0, 0, -d / 2);
  return geom;
}

function buildSensorBand() {
  // Curva de la banda sobre la cabeza
  const bandCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.12, 0.065, -0.02),
    new THREE.Vector3(-0.14, 0.10, -0.03),
    new THREE.Vector3(-0.12, 0.14, -0.01),
    new THREE.Vector3(-0.05, 0.16, 0.0),
    new THREE.Vector3(0.0, 0.165, 0.0),
    new THREE.Vector3(0.05, 0.16, 0.0),
    new THREE.Vector3(0.12, 0.14, -0.01),
    new THREE.Vector3(0.14, 0.10, -0.03),
    new THREE.Vector3(0.12, 0.065, -0.02),
  ]);

  const bandGeom = new THREE.TubeGeometry(bandCurve, 32, 0.006, 8, false);
  const band = new THREE.Mesh(bandGeom, darkMat);
  sensorBandGroup.add(band);
  originalPositions.set(band.uuid, { pos: band.position.clone(), rot: band.rotation.clone() });

  // Electrodos EEG (posiciones aproximadas 10-20)
  const electrodePositions = [
    [-0.10, 0.09, -0.025], [-0.07, 0.13, -0.015], [-0.03, 0.155, -0.005],
    [0.0, 0.16, 0.0],
    [0.03, 0.155, -0.005], [0.07, 0.13, -0.015], [0.10, 0.09, -0.025],
    [-0.13, 0.11, -0.028], [0.13, 0.11, -0.028],
    [-0.05, 0.15, 0.01], [0.05, 0.15, 0.01],
    [-0.09, 0.125, -0.01], [0.09, 0.125, -0.01]
  ];

  const electrodeGeom = new THREE.CylinderGeometry(0.004, 0.005, 0.008, 12);
  const electrodeRingGeom = new THREE.TorusGeometry(0.005, 0.001, 6, 16);

  electrodePositions.forEach(p => {
    const elec = new THREE.Mesh(electrodeGeom, createElectrodeMaterial());
    elec.position.set(p[0], p[1], p[2]);
    // Orientar electrodos hacia abajo
    elec.lookAt(p[0], p[1] - 0.1, p[2]);
    sensorBandGroup.add(elec);
    originalPositions.set(elec.uuid, { pos: elec.position.clone(), rot: elec.rotation.clone() });

    // Anillo metálico del electrodo
    const eRing = new THREE.Mesh(electrodeRingGeom, metalMat);
    eRing.position.set(p[0], p[1], p[2]);
    eRing.lookAt(p[0], p[1] - 0.1, p[2]);
    sensorBandGroup.add(eRing);
    originalPositions.set(eRing.uuid, { pos: eRing.position.clone(), rot: eRing.rotation.clone() });
  });

  // Trazos de conexión entre electrodos
  for (let i = 0; i < electrodePositions.length - 1; i++) {
    const p1 = new THREE.Vector3(...electrodePositions[i]);
    const p2 = new THREE.Vector3(...electrodePositions[i + 1]);
    const mid = p1.clone().add(p2).multiplyScalar(0.5);
    mid.y += 0.005;
    const traceCurve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
    const traceGeom = new THREE.TubeGeometry(traceCurve, 8, 0.001, 4, false);
    const traceMat = new THREE.MeshBasicMaterial({ color: 0x4FC3F7, transparent: true, opacity: 0.15 });
    const trace = new THREE.Mesh(traceGeom, traceMat);
    sensorBandGroup.add(trace);
    originalPositions.set(trace.uuid, { pos: trace.position.clone(), rot: trace.rotation.clone() });
  }

  scene.add(sensorBandGroup);
}

  const connectionPairs = [
    [0, 1], [0, 2], [0, 5], [0, 6], [1, 3], [2, 4], [3, 6], [4, 6],
    [1, 7], [2, 8], [0, 6], [6, 3], [6, 4]
  ];
  const connectionLines = [];
  connectionPairs.forEach(([a, b]) => {
    const pA = new THREE.Vector3(...nodePositions[a].pos);
    const pB = new THREE.Vector3(...nodePositions[b].pos);
    const lineGeom = new THREE.BufferGeometry().setFromPoints([pA, pB]);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x4FC3F7, transparent: true, opacity: 0 });
    const line = new THREE.Line(lineGeom, lineMat);
    aiNodesGroup.add(line);
    connectionLines.push({ line, mat: lineMat, a, b });
  });

  aiNodesGroup.userData = { nodeMeshes, connectionLines, visible: false };
  aiNodesGroup.visible = false;
  scene.add(aiNodesGroup);
}

function buildEnergyFlow() {
  // Partículas de energía a lo largo del cable principal
  const energyCount = 60;
  const ePositions = new Float32Array(energyCount * 3);
  eProgress = new Float32Array(energyCount);
  for (let i = 0; i < energyCount; i++) {
    eProgress[i] = Math.random();
  }

  const eGeom = new THREE.BufferGeometry();
  eGeom.setAttribute('position', new THREE.BufferAttribute(ePositions, 3));

  const eMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: { uColor: { value: new THREE.Color(0x4FC3F7) } },
    vertexShader: `
      varying float vDist;
      void main() {
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vDist = -mvPos.z;
        gl_PointSize = 4.0 * (0.2 / max(vDist, 0.01));
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float glow = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(uColor, glow * 0.9);
      }
    `
  });

  const energyPoints = new THREE.Points(eGeom, eMat);
  energyGroup.add(energyPoints);

  // Curva de referencia para el flujo de energía
  const energyCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0.0, -0.065, 0.02),
    new THREE.Vector3(0.05, -0.07, 0.03),
    new THREE.Vector3(0.12, -0.075, 0.02),
    new THREE.Vector3(0.18, -0.08, 0.01),
    new THREE.Vector3(0.22, -0.08, -0.025),
    // Desde la unidad hacia el headset por la banda
    new THREE.Vector3(0.12, -0.02, -0.02),
    new THREE.Vector3(0.0, 0.065, -0.02),
    new THREE.Vector3(-0.05, 0.12, -0.02),
    new THREE.Vector3(0.0, 0.16, 0.0),
    new THREE.Vector3(0.05, 0.12, -0.02),
  ]);
  energyGroup.userData = { energyCurve, energyPoints, visible: false };
  energyGroup.visible = false;
  scene.add(energyGroup);
}

function buildSwarmAI() {
  const swarmCount = 300;
  const sPositions = new Float32Array(swarmCount * 3);
  const sVelocities = [];
  const sTargets = [];
  for (let i = 0; i < swarmCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    const r = 0.15 + Math.random() * 0.1;
    sPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    sPositions[i * 3 + 1] = 0.1 + r * Math.cos(phi);
    sPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    sVelocities.push(new THREE.Vector3(
      (Math.random() - 0.5) * 0.002,
      (Math.random() - 0.5) * 0.002,
      (Math.random() - 0.5) * 0.002
    ));
    sTargets.push(new THREE.Vector3(
      (Math.random() - 0.5) * 0.2,
      0.05 + Math.random() * 0.2,
      (Math.random() - 0.5) * 0.2
    ));
  }

  const sGeom = new THREE.BufferGeometry();
  sGeom.setAttribute('position', new THREE.BufferAttribute(sPositions, 3));

  const sMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0x4FC3F7) } },
    vertexShader: `
      varying float vAlpha;
      void main() {
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vAlpha = 0.6;
        gl_PointSize = 3.0 * (0.15 / max(-mvPos.z, 0.01));
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float glow = smoothstep(0.5, 0.05, d);
        gl_FragColor = vec4(uColor, glow * vAlpha);
      }
    `
  });

  const swarmPoints = new THREE.Points(sGeom, sMat);
  swarmGroup.add(swarmPoints);
  swarmGroup.userData = { velocities: sVelocities, targets: sTargets, visible: false };
  swarmGroup.visible = false;
  scene.add(swarmGroup);
}

// RED NEURONAL 3D
// ============================================================
function buildNeuralNetwork() {
  const layers = [5, 8, 10, 8, 4];
  const layerSpacing = 0.06;
  const neuronRadius = 0.005;
  const neuronMeshes = [];
  const connectionLines = [];

  layers.forEach((count, li) => {
    const x = (li - (layers.length - 1) / 2) * layerSpacing;
    const layerNeurons = [];
    for (let ni = 0; ni < count; ni++) {
      const y = ((ni - (count - 1) / 2) * 0.018);
      const z = (Math.random() - 0.5) * 0.02;
      const nGeom = new THREE.SphereGeometry(neuronRadius, 10, 10);
      const nMat = new THREE.MeshStandardMaterial({
        color: 0x4FC3F7,
        emissive: 0x4FC3F7,
        emissiveIntensity: 0,
        transparent: true,
        opacity: 0
      });
      const neuron = new THREE.Mesh(nGeom, nMat);
      neuron.position.set(x, y + 0.15, z);
      neuralGroup.add(neuron);
      layerNeurons.push({ mesh: neuron, mat: nMat, baseEmissive: 0 });
    }
    neuronMeshes.push(layerNeurons);
  });

  // Conexiones entre capas
  for (let li = 0; li < layers.length - 1; li++) {
    for (let ni = 0; ni < layers[li]; ni++) {
      for (let nj = 0; nj < layers[li + 1]; nj++) {
        if (Math.random() > 0.4) continue; // No todas las conexiones
        const pA = neuronMeshes[li][ni].mesh.position;
        const pB = neuronMeshes[li + 1][nj].mesh.position;
        const lGeom = new THREE.BufferGeometry().setFromPoints([pA, pB]);
        const lMat = new THREE.LineBasicMaterial({ color: 0x4FC3F7, transparent: true, opacity: 0 });
        const line = new THREE.Line(lGeom, lMat);
        neuralGroup.add(line);
        connectionLines.push({ line, mat: lMat, fromLayer: li, fromNode: ni, toNode: nj });
      }
    }
  }

  neuralGroup.userData = { neuronMeshes, connectionLines, visible: false };
  neuralGroup.visible = false;
  scene.add(neuralGroup);
}

// HUD TÁCTICO 3D (ELEMENTOS HOLOGRÁFICOS)
// ============================================================
function buildHUD3D() {
  // Paneles holográficos alrededor del headset
  const hudPanelMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x4FC3F7) },
      uOpacity: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      void main() {
        vUv = uv;
        vWorldNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uOpacity;
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      void main() {
        float scanline = sin(vUv.y * 80.0 + uTime * 4.0) * 0.5 + 0.5;
        float border = step(0.02, vUv.x) * step(0.02, vUv.y) *
                       step(vUv.x, 0.98) * step(vUv.y, 0.98);
        float corner = smoothstep(0.0, 0.05, vUv.x) * smoothstep(0.0, 0.05, vUv.y) *
                       smoothstep(0.0, 0.05, 1.0 - vUv.x) * smoothstep(0.0, 0.05, 1.0 - vUv.y);
        float alpha = border * (scanline * 0.15 + 0.1) * corner * uOpacity;
        gl_FragColor = vec4(uColor, alpha);
      }
    `
  });

  // Panel izquierdo
  const panelLGeom = new THREE.PlaneGeometry(0.12, 0.08);
  const panelL = new THREE.Mesh(panelLGeom, hudPanelMat.clone());
  panelL.position.set(-0.22, 0.08, 0.05);
  panelL.rotation.y = 0.3;
  hud3dGroup.add(panelL);

  // Panel derecho
  const panelR = new THREE.Mesh(panelLGeom.clone(), hudPanelMat.clone());
  panelR.position.set(0.22, 0.08, 0.05);
  panelR.rotation.y = -0.3;
  hud3dGroup.add(panelR);

  // Panel inferior
  const panelBGeom = new THREE.PlaneGeometry(0.2, 0.06);
  const panelB = new THREE.Mesh(panelBGeom, hudPanelMat.clone());
  panelB.position.set(0, -0.15, 0.08);
  panelB.rotation.x = -0.4;
  hud3dGroup.add(panelB);

  // Anillos de datos orbitales
  for (let i = 0; i < 3; i++) {
    const orbitR = 0.15 + i * 0.04;
    const orbitGeom = new THREE.TorusGeometry(orbitR, 0.001, 6, 64);
    const orbitMat = new THREE.MeshBasicMaterial({
      color: 0x4FC3F7, transparent: true, opacity: 0
    });
    const orbit = new THREE.Mesh(orbitGeom, orbitMat);
    orbit.position.set(0, 0.05, -0.02);
    orbit.rotation.x = Math.PI / 2 + i * 0.3;
    orbit.rotation.z = i * 0.5;
    hud3dGroup.add(orbit);
  }

  // Texto en canvas para los paneles
  function makeTextTexture(text, w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(10,14,20,0.0)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#4FC3F7';
    ctx.font = '600 18px monospace';
    ctx.textAlign = 'left';
    const lines = text.split('\n');
    lines.forEach((line, i) => {
      ctx.globalAlpha = 0.7 - i * 0.05;
      ctx.fillText(line, 10, 25 + i * 22);
    });
    return new THREE.CanvasTexture(c);
  }

  const texts = [
    'EEG: 10.5 Hz\nfNIRS: 68.2%\nCOG: 0.72\nSTATE: ACTIVE',
    'RNN: 0.94\nRL: 0.89\nXAI: PASS\nDRIFT: 0.02',
    'SESSION: 24:15\nENGAGEMENT: 87%\nDIFFICULTY: 7\nPATIENT: OK'
  ];
  const panels = [panelL, panelR, panelB];
  panels.forEach((p, i) => {
    const tGeom = new THREE.PlaneGeometry(0.11, 0.07);
    const tMat = new THREE.MeshBasicMaterial({
      map: makeTextTexture(texts[i], 256, 128),
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const tMesh = new THREE.Mesh(tGeom, tMat);
    tMesh.position.copy(p.position);
    tMesh.position.z += 0.001 * (i === 2 ? -1 : 1);
    tMesh.rotation.copy(p.rotation);
    tMesh.userData.textMat = tMat;
    hud3dGroup.add(tMesh);
  });

  hud3dGroup.userData = { visible: false, hudPanelMat };
  hud3dGroup.visible = false;
  scene.add(hud3dGroup);
}

const stateColors = {
  off: { led: 0x000000, emissive: 0, electrode: 0x000000, electrodeEmissive: 0 },
  standby: { led: 0x4FC3F7, emissive: 0.3, electrode: 0x000000, electrodeEmissive: 0 },
  calibration: { led: 0xFFC107, emissive: 0.6, electrode: 0xFFC107, electrodeEmissive: 0.2 },
  therapy: { led: 0x4FC3F7, emissive: 1.0, electrode: 0x4FC3F7, electrodeEmissive: 0.5 },
  emergency: { led: 0xFF1744, emissive: 1.0, electrode: 0xFF1744, electrodeEmissive: 0.8 }
};

function setState(state) {
  currentState = state;
  const sc = stateColors[state];
  const stateText = document.getElementById('state-text');
  const stateDot = document.getElementById('state-dot');

  // Actualizar LEDs
  ledMaterials.forEach(m => {
    m.color.setHex(sc.led);
    m.emissive.setHex(sc.led);
    m.emissiveIntensity = sc.emissive;
  });

  // Actualizar electrodos
  electrodeMaterials.forEach(m => {
    m.emissive.setHex(sc.electrode);
    m.emissiveIntensity = sc.electrodeEmissive;
  });

  // Indicador de estado UI
  const dotColor = state === 'off' ? '#2D2D2D' : state === 'emergency' ? '#FF1744' : state === 'calibration' ? '#FFC107' : '#4FC3F7';
  stateDot.style.background = dotColor;
  stateDot.style.boxShadow = state === 'off' ? 'none' : `0 0 8px ${dotColor}`;

  // Temporizador de sesión
  if (state === 'therapy' || state === 'calibration') {
    if (!sessionInterval) {
      sessionInterval = setInterval(() => {
        sessionTime++;
        const m = String(Math.floor(sessionTime / 60)).padStart(2, '0');
        const s = String(sessionTime % 60).padStart(2, '0');
        document.getElementById('hud-session').textContent = `${m}:${s}`;
      }, 1000);
    }
  } else {
    clearInterval(sessionInterval);
    sessionInterval = null;
    if (state === 'off') {
      sessionTime = 0;
      document.getElementById('hud-session').textContent = '00:00';
    }
  }

  showToast(i18n[currentLang].toast_state + (i18n[currentLang]['st_' + state.replace('therapy', 'therapy')] || state));
}

function setSimulation(sim) {
  // Ocultar todas las visualizaciones primero
  aiNodesGroup.visible = false;
  energyGroup.visible = false;
  swarmGroup.visible = false;
  neuralGroup.visible = false;
  hud3dGroup.visible = false;

  if (currentSim === sim) {
    currentSim = null;
    // Restablecer opacidades
    resetSimVisuals();
    showToast(i18n[currentLang].toast_sim + 'OFF');
    return;
  }

  currentSim = sim;
  controls.autoRotate = sim !== 'biomechanics';

  switch (sim) {
    case 'biomechanics':
      // La biomecánica se maneja en el loop de animación
      break;
    case 'modular':
      toggleExploded(true);
      break;
    case 'energy':
      energyGroup.visible = true;
      break;
    case 'swarm':
      swarmGroup.visible = true;
      break;
    case 'hud3d':
      hud3dGroup.visible = true;
      // Animar opacidad de paneles
      hud3dGroup.children.forEach(child => {
        if (child.material && child.material.uniforms && child.material.uniforms.uOpacity) {
          child.material.uniforms.uOpacity.value = 1.0;
        }
        if (child.userData.textMat) {
          child.userData.textMat.opacity = 0.8;
        }
        if (child.material && child.material.opacity !== undefined && !child.material.uniforms) {
          child.material.opacity = 0.3;
        }
      });
      break;
    case 'neural':
      neuralGroup.visible = true;
      neuralGroup.userData.neuronMeshes.forEach(layer => {
        layer.forEach(n => {
          n.mat.opacity = 0.9;
          n.mat.emissiveIntensity = 0.3;
        });
      });
      neuralGroup.userData.connectionLines.forEach(c => {
        c.mat.opacity = 0.15;
      });
      break;
  }

  showToast(i18n[currentLang].toast_sim + sim);
}

function resetSimVisuals() {
  // Reset nodos IA
  aiNodesGroup.children.forEach(c => {
    if (c.userData.mat) c.userData.mat.opacity = 0;
    if (c.material && c.material.opacity !== undefined) c.material.opacity = 0;
  });
  // Reset energía
  // Reset enjambre
  // Reset red neural
  neuralGroup.userData.neuronMeshes.forEach(layer => {
    layer.forEach(n => { n.mat.opacity = 0; n.mat.emissiveIntensity = 0; });
  });
  neuralGroup.userData.connectionLines.forEach(c => { c.mat.opacity = 0; });
  // Reset HUD 3D
  hud3dGroup.children.forEach(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uOpacity) {
      child.material.uniforms.uOpacity.value = 0;
    }
    if (child.userData.textMat) child.userData.textMat.opacity = 0;
    if (child.material && child.material.opacity !== undefined && !child.material.uniforms) {
      child.material.opacity = 0;
    }
  });
  // Reset vista explotada
  if (isExploded) toggleExploded(false);
}

// VISTA EXPLOTADA
// ============================================================
const explodeOffsets = {
  headset: new THREE.Vector3(0, 0, 0),
  sensorBand: new THREE.Vector3(0, 0.12, 0),
  processingUnit: new THREE.Vector3(0.15, -0.08, 0),
  cable: new THREE.Vector3(0.05, -0.12, 0.08)
};

let explodeAnimProgress = 0;
let explodeAnimating = false;
let explodeTarget = false;

function toggleExploded(exploded) {
  isExploded = exploded;
  explodeTarget = exploded;
  explodeAnimating = true;
}

function updateExplode(dt) {
  if (!explodeAnimating) return;
  const speed = 2.0;
  if (explodeTarget) {
    explodeAnimProgress = Math.min(1, explodeAnimProgress + dt * speed);
  } else {
    explodeAnimProgress = Math.max(0, explodeAnimProgress - dt * speed);
  }
  const t = smoothstep(explodeAnimProgress);

  headsetGroup.children.forEach(child => {
    const orig = originalPositions.get(child.uuid);
    if (orig) {
      child.position.lerpVectors(orig.pos, orig.pos.clone().add(explodeOffsets.headset), t);
    }
  });
  sensorBandGroup.children.forEach(child => {
    const orig = originalPositions.get(child.uuid);
    if (orig) {
      child.position.lerpVectors(orig.pos, orig.pos.clone().add(explodeOffsets.sensorBand), t);
    }
  });
  processingUnitGroup.children.forEach(child => {
    const orig = originalPositions.get(child.uuid);
    if (orig) {
      child.position.lerpVectors(orig.pos, orig.pos.clone().add(explodeOffsets.processingUnit), t);
    }
  });
  cableGroup.children.forEach(child => {
    const orig = originalPositions.get(child.uuid);
    if (orig) {
      child.position.lerpVectors(orig.pos, orig.pos.clone().add(explodeOffsets.cable), t);
    }
  });

  if ((explodeTarget && explodeAnimProgress >= 1) || (!explodeTarget && explodeAnimProgress <= 0)) {
    explodeAnimating = false;
  }
}

function smoothstep(t) {
  return t * t * (3 - 2 * t);
}

  const arBtn = document.getElementById('ar-toggle');

      showToast(i18n[currentLang].toast_ar_on);

function updateHUD(time) {
  const diff = parseInt(diffSlider.value);
  const sens = parseInt(sensSlider.value);
  const isActive = currentState === 'therapy' || currentState === 'calibration';

  if (isActive) {
    const eegBase = 8 + diff * 0.8 + Math.sin(time * 2.3) * 1.5;
    const fnirsBase = 55 + sens * 3 + Math.sin(time * 1.7) * 5;
    const cogBase = 0.3 + diff * 0.06 + Math.sin(time * 1.1) * 0.1;
    const engBase = 60 + diff * 2.5 + Math.sin(time * 0.8) * 8;

    document.getElementById('hud-eeg').textContent = eegBase.toFixed(2) + ' Hz';
    document.getElementById('hud-fnirs').textContent = fnirsBase.toFixed(1) + ' %';
    document.getElementById('hud-cog').textContent = Math.min(cogBase, 1.0).toFixed(2);
    document.getElementById('hud-eng').textContent = Math.min(Math.round(engBase), 99) + ' %';
  } else if (currentState === 'standby') {
    document.getElementById('hud-eeg').textContent = (8.5 + Math.sin(time) * 0.3).toFixed(2) + ' Hz';
    document.getElementById('hud-fnirs').textContent = (58 + Math.sin(time * 0.7) * 1).toFixed(1) + ' %';
    document.getElementById('hud-cog').textContent = (0.15 + Math.sin(time * 0.5) * 0.02).toFixed(2);
    document.getElementById('hud-eng').textContent = '0 %';
  } else {
    document.getElementById('hud-eeg').textContent = '0.00 Hz';
    document.getElementById('hud-fnirs').textContent = '0.00 %';
    document.getElementById('hud-cog').textContent = '0.00';
    document.getElementById('hud-eng').textContent = '0 %';
  }
}

// ============================================================
// BUCLE DE ANIMACIÓN PRINCIPAL
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  controls.update();
  updateExplode(dt);
  updateHUD(time);

  // Partículas ambientales
  apMat.uniforms.uTime.value = time;

  // Anillo de suelo pulsa
  ring.material.opacity = 0.15 + 0.1 * Math.sin(time * 1.5);

  // Simulación de biomecánica: movimiento sutil del headset
  if (currentSim === 'biomechanics') {
    const bioX = Math.sin(time * 0.7) * 0.02;
    const bioY = Math.cos(time * 0.5) * 0.015 + Math.sin(time * 1.3) * 0.008;
    const bioZ = Math.sin(time * 0.9) * 0.01;
    const bioRx = Math.sin(time * 0.6) * 0.05;
    const bioRy = Math.sin(time * 0.4) * 0.08;
    headsetGroup.position.set(bioX, bioY, bioZ);
    headsetGroup.rotation.set(bioRx, bioRy, 0);
    sensorBandGroup.position.set(bioX, bioY, bioZ);
    sensorBandGroup.rotation.set(bioRx, bioRy, 0);
  } else if (!isExploded) {
    // Retornar suavemente a posición original
    headsetGroup.position.lerp(new THREE.Vector3(0, 0, 0), dt * 3);
    headsetGroup.rotation.lerp(new THREE.Euler(0, 0, 0), dt * 3);
    sensorBandGroup.position.lerp(new THREE.Vector3(0, 0, 0), dt * 3);
    sensorBandGroup.rotation.lerp(new THREE.Euler(0, 0, 0), dt * 3);
  }

  // Pulso de electrodos en estados activos
  if (currentState === 'therapy' || currentState === 'calibration') {
    electrodeMaterials.forEach((m, i) => {
      const pulse = 0.3 + 0.4 * Math.sin(time * 3 + i * 0.8);
      m.emissiveIntensity = pulse;
    });
  }

  // Pulso de LEDs en standby
  if (currentState === 'standby') {
    ledMaterials.forEach((m, i) => {
      m.emissiveIntensity = 0.15 + 0.15 * Math.sin(time * 2 + i * 0.5);
    });
  }

  // Parpadeo en emergencia
  if (currentState === 'emergency') {
    const blink = Math.sin(time * 8) > 0 ? 1.0 : 0.1;
    ledMaterials.forEach(m => { m.emissiveIntensity = blink; });
    electrodeMaterials.forEach(m => { m.emissiveIntensity = blink * 0.8; });
  }

  // ---- SIMULACIÓN: ENERGÍA HÍBRIDA ----
  if (energyGroup.visible) {
    const curve = energyGroup.userData.energyCurve;
    const positions = energyGroup.userData.energyPoints.geometry.attributes.position.array;
    for (let i = 0; i < eProgress.length; i++) {
      eProgress[i] = (eProgress[i] + dt * (0.15 + Math.random() * 0.1)) % 1.0;
      const pt = curve.getPointAt(eProgress[i]);
      // Añadir algo de variación radial
      const offset = 0.005;
      positions[i * 3] = pt.x + (Math.random() - 0.5) * offset;
      positions[i * 3 + 1] = pt.y + (Math.random() - 0.5) * offset;
      positions[i * 3 + 2] = pt.z + (Math.random() - 0.5) * offset;
    }
    energyGroup.userData.energyPoints.geometry.attributes.position.needsUpdate = true;
  }

  // ---- SIMULACIÓN: IA DE ENJAMBRE ----
  if (swarmGroup.visible) {
    const sPos = swarmGroup.children[0].geometry.attributes.position.array;
    const vels = swarmGroup.userData.velocities;
    const targets = swarmGroup.userData.targets;
    for (let i = 0; i < vels.length; i++) {
      // Cambiar objetivo periódicamente
      if (Math.random() < 0.005) {
        targets[i].set(
          (Math.random() - 0.5) * 0.2,
          0.05 + Math.random() * 0.2,
          (Math.random() - 0.5) * 0.2
        );
      }
      // Comportamiento de enjambre: hacia objetivo + separación + cohesión
      const toTarget = new THREE.Vector3().subVectors(targets[i],
        new THREE.Vector3(sPos[i * 3], sPos[i * 3 + 1], sPos[i * 3 + 2]));
      toTarget.multiplyScalar(0.001);
      vels[i].add(toTarget);
      vels[i].multiplyScalar(0.98); // Amortiguación
      // Limitar velocidad
      if (vels[i].length() > 0.003) vels[i].setLength(0.003);

      sPos[i * 3] += vels[i].x;
      sPos[i * 3 + 1] += vels[i].y;
      sPos[i * 3 + 2] += vels[i].z;
    }
    swarmGroup.children[0].geometry.attributes.position.needsUpdate = true;
    swarmGroup.children[0].material.uniforms.uTime.value = time;
  }

  // ---- SIMULACIÓN: NODOS IA ----
  if (aiNodesGroup.visible) {
    const { nodeMeshes, connectionLines } = aiNodesGroup.userData;
    // Animar aparición
    nodeMeshes.forEach((n, i) => {
      n.mat.opacity = Math.min(1, n.mat.opacity + dt * 2);
      // Pulso sutil
      const pulse = 0.3 + 0.2 * Math.sin(time * 2 + i * 1.2);
      n.mat.emissiveIntensity = pulse;
      // Movimiento orbital sutil
      const base = n.userData.basePos;
      n.position.x = base[0] + Math.sin(time * 0.5 + i) * 0.005;
      n.position.y = base[1] + Math.cos(time * 0.4 + i * 0.7) * 0.005;
    });
    // Actualizar conexiones
    connectionLines.forEach(c => {
      c.mat.opacity = Math.min(0.3, c.mat.opacity + dt);
      // Pulso en las líneas
      c.mat.opacity = 0.1 + 0.15 * Math.sin(time * 3 + c.a + c.b);
    });
    // Anillos orbitales
    aiNodesGroup.children.forEach((child, i) => {
      if (child.userData.mat) {
        child.userData.mat.opacity = Math.min(0.4, child.userData.mat.opacity + dt);
        child.rotation.x += dt * (0.5 + i * 0.1);
        child.rotation.z += dt * 0.3;
        child.position.copy(nodeMeshes[Math.min(i, nodeMeshes.length - 1)].position);
      }
    });
  }

  // ---- SIMULACIÓN: RED NEURONAL ----
  if (neuralGroup.visible) {
    const { neuronMeshes, connectionLines } = neuralGroup.userData;
    // Activación secuencial de neuronas
    const wavePhase = (time * 0.5) % 1.0;
    neuronMeshes.forEach((layer, li) => {
      const layerPhase = li / (neuronMeshes.length - 1);
      const activation = Math.max(0, 1 - Math.abs(wavePhase - layerPhase) * 4);
      layer.forEach((n, ni) => {
        const localActivation = activation * (0.5 + 0.5 * Math.sin(time * 4 + ni * 2));
        n.mat.emissiveIntensity = Math.max(0.1, localActivation);
      });
    });
    // Pulso en conexiones
    connectionLines.forEach((c, i) => {
      const linePhase = (time * 0.8 + i * 0.01) % 1.0;
      c.mat.opacity = 0.05 + 0.2 * Math.max(0, Math.sin(linePhase * Math.PI));
    });
  }

  // ---- SIMULACIÓN: HUD TÁCTICO 3D ----
  if (hud3dGroup.visible) {
    hud3dGroup.children.forEach(child => {
      if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
        child.material.uniforms.uTime.value = time;
      }
      // Rotación de anillos orbitales
      if (child.geometry && child.geometry.type === 'TorusGeometry') {
        child.rotation.z += dt * 0.2;
      }
    });
  }

  // Actualizar luces de acento según estado
  if (currentState === 'therapy') {
    rimLight.intensity = 1.2 + 0.3 * Math.sin(time * 2);
    bottomLight.intensity = 0.3 + 0.15 * Math.sin(time * 1.5);
  } else if (currentState === 'emergency') {
    rimLight.color.setHex(Math.sin(time * 8) > 0 ? 0xFF1744 : 0x440000);
    rimLight.intensity = 1.5;
  } else {
    rimLight.color.setHex(0x4FC3F7);
    rimLight.intensity = 1.2;
    bottomLight.intensity = 0.3;
  }

  renderer.render(scene, camera);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// INICIO
// ============================================================
setState('off');
animate();

</script>
</body>
</html>
