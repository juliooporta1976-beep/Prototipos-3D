<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR NeuroRehab+ — Prototipo 3D Interactivo</title>
<style>
  :root {
    --titanium: #6B7280;
    --titanium-dark: #4B5563;
    --cyan: #4FC3F7;
    --cyan-dim: rgba(79,195,247,0.3);
    --silver: #9CA3AF;
    --white-clinic: #F3F4F6;
    --anthracite: #1F2937;
    --bg: #0D1117;
    --hud-bg: rgba(13,17,23,0.85);
    --border: rgba(79,195,247,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; color:var(--white-clinic); }
  canvas { display:block; }

  /* Nombre del Dr. */
  #author-badge {
    position:fixed; top:16px; left:16px; z-index:100;
    background: linear-gradient(135deg, rgba(79,195,247,0.12), rgba(31,41,55,0.9));
    border:1px solid var(--border); border-radius:8px;
    padding:10px 18px; backdrop-filter:blur(12px);
    font-size:13px; font-weight:600; letter-spacing:0.5px;
    color: var(--cyan); text-shadow:0 0 12px rgba(79,195,247,0.3);
    pointer-events:none;
  }
  #author-badge span { color: var(--white-clinic); font-weight:400; opacity:0.85; }

  /* Selector de idioma */
  #lang-selector {
    position:fixed; top:16px; right:16px; z-index:100;
    display:flex; gap:4px;
  }
  #lang-selector button {
    background: var(--hud-bg); border:1px solid var(--border);
    color: var(--silver); padding:7px 14px; border-radius:6px;
    cursor:pointer; font-size:12px; font-weight:600;
    transition: all 0.3s;
  }
  #lang-selector button:hover, #lang-selector button.active {
    background: rgba(79,195,247,0.15); color: var(--cyan);
    border-color: var(--cyan); box-shadow: 0 0 12px rgba(79,195,247,0.2);
  }

  /* Panel de controles */
  #controls-panel {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:100;
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    background: var(--hud-bg); border:1px solid var(--border);
    border-radius:12px; padding:12px 16px; backdrop-filter:blur(16px);
  }
  #controls-panel button {
    background: rgba(79,195,247,0.08); border:1px solid rgba(79,195,247,0.2);
    color: var(--white-clinic); padding:8px 16px; border-radius:8px;
    cursor:pointer; font-size:11px; font-weight:600;
    transition: all 0.3s; white-space:nowrap;
  }
  #controls-panel button:hover {
    background: rgba(79,195,247,0.2); border-color: var(--cyan);
    color: var(--cyan); transform:translateY(-1px);
    box-shadow: 0 4px 16px rgba(79,195,247,0.15);
  }
  #controls-panel button.active-mode {
    background: rgba(79,195,247,0.25); border-color: var(--cyan);
    color: var(--cyan); box-shadow: 0 0 16px rgba(79,195,247,0.25);
  }

  /* HUD lateral */
  #hud-left {
    position:fixed; left:16px; top:50%; transform:translateY(-50%); z-index:100;
    display:flex; flex-direction:column; gap:8px;
  }
  .hud-stat {
    background: var(--hud-bg); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px; backdrop-filter:blur(12px);
    min-width:160px;
  }
  .hud-stat .label { font-size:9px; color:var(--silver); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .hud-stat .value { font-size:18px; font-weight:700; color:var(--cyan); }
  .hud-stat .bar { height:3px; background:rgba(79,195,247,0.15); border-radius:2px; margin-top:6px; }
  .hud-stat .bar-fill { height:100%; background:var(--cyan); border-radius:2px; transition:width 0.8s; }

  /* HUD derecho */
  #hud-right {
    position:fixed; right:16px; top:50%; transform:translateY(-50%); z-index:100;
    display:flex; flex-direction:column; gap:8px;
  }
  .hud-node {
    background: var(--hud-bg); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; backdrop-filter:blur(12px);
    font-size:10px; display:flex; align-items:center; gap:8px;
    transition: all 0.3s;
  }
  .hud-node .dot { width:8px; height:8px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .hud-node.processing .dot { animation: pulse-dot 1s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

  /* Indicador de modo */
  #mode-indicator {
    position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:100;
    background: linear-gradient(90deg, transparent, rgba(79,195,247,0.1), transparent);
    border:1px solid var(--border); border-radius:20px;
    padding:6px 24px; font-size:11px; color:var(--cyan);
    letter-spacing:2px; text-transform:uppercase; font-weight:600;
    backdrop-filter:blur(8px);
    opacity:0; transition: opacity 0.5s;
  }
  #mode-indicator.visible { opacity:1; }

  /* AR overlay */
  #ar-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:50;
    display:none; background:#000;
  }
  #ar-overlay video { width:100%; height:100%; object-fit:cover; }
  #ar-overlay canvas { position:absolute; top:0; left:0; }
  #ar-close {
    position:absolute; top:16px; right:16px; z-index:60;
    background:rgba(239,68,68,0.8); border:none; color:white;
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    font-size:18px; font-weight:bold;
  }

  /* Tooltip */
  #tooltip {
    position:fixed; z-index:200; display:none;
    background: var(--hud-bg); border:1px solid var(--cyan);
    border-radius:8px; padding:10px 14px; backdrop-filter:blur(16px);
    max-width:240px; font-size:11px; line-height:1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip .tt-title { color:var(--cyan); font-weight:700; font-size:12px; margin-bottom:4px; }

  /* Loading */
  #loading {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000;
    background: var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  #loading h2 { color:var(--cyan); font-size:24px; margin-bottom:8px; letter-spacing:2px; }
  #loading p { color:var(--silver); font-size:12px; margin-bottom:24px; }
  .loader-ring {
    width:48px; height:48px; border:3px solid rgba(79,195,247,0.15);
    border-top-color:var(--cyan); border-radius:50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Responsive */
  @media(max-width:768px) {
    #hud-left, #hud-right { display:none; }
    #controls-panel { bottom:10px; padding:8px 10px; }
    #controls-panel button { padding:6px 10px; font-size:10px; }
    #author-badge { font-size:11px; padding:8px 12px; }
  }
</style>
</head>
<body>

<!-- Pantalla de carga -->
<div id="loading">
  <h2>VR NeuroRehab+</h2>

  <div class="loader-ring"></div>

<!-- Nombre del autor -->

<!-- Selector de idioma -->

<!-- Indicador de modo -->

<!-- HUD izquierdo - Estadísticas -->

    <div class="value" id="stat-cognitive">42%</div>
    <div class="bar"><div class="bar-fill" id="bar-cognitive" style="width:42%"></div></div>
  </div>
  <div class="hud-stat">
    <div class="label" data-i18n="attention">Atención</div>
    <div class="value" id="stat-attention">91%</div>
    <div class="bar"><div class="bar-fill" id="bar-attention" style="width:91%"></div></div>
  </div>
  <div class="hud-stat">
    <div class="label" data-i18n="plasticity">Plasticidad</div>
    <div class="value" id="stat-plasticity">73%</div>
    <div class="bar"><div class="bar-fill" id="bar-plasticity" style="width:73%"></div></div>
  </div>
</div>

<!-- HUD derecho - Nodos IA -->
<div id="hud-right">
  <div class="hud-node processing" id="node-eeg"><div class="dot"></div><span data-i18n="node_eeg">Captura EEG</span></div>
  <div class="hud-node" id="node-fnirs"><div class="dot" style="background:#81C784;box-shadow:0 0 8px #81C784"></div><span data-i18n="node_fnirs">fNIRS Prefrontal</span></div>
  <div class="hud-node" id="node-preprocess"><div class="dot" style="background:#FFB74D;box-shadow:0 0 8px #FFB74D"></div><span data-i18n="node_preprocess">Preprocesamiento</span></div>
  <div class="hud-node" id="node-ai"><div class="dot"></div><span data-i18n="node_ai">IA Adaptativa</span></div>
  <div class="hud-node" id="node-vr"><div class="dot" style="background:#CE93D8;box-shadow:0 0 8px #CE93D8"></div><span data-i18n="node_vr">Entorno VR</span></div>
  <div class="hud-node" id="node-feedback"><div class="dot" style="background:#4DB6AC;box-shadow:0 0 8px #4DB6AC"></div><span data-i18n="node_feedback">Biofeedback</span></div>
</div>

<!-- Panel de controles inferior -->
<div id="controls-panel">
  <button data-mode="calibration" data-i18n="btn_calibrate">Calibración</button>
  <button data-mode="therapy" data-i18n="btn_therapy">Terapia</button>
  <button data-mode="analysis" data-i18n="btn_analysis">Análisis IA</button>
  <button data-mode="biomechanics" data-i18n="btn_biomech">Biomecánica</button>
  <button data-mode="swarm" data-i18n="btn_swarm">IA Enjambre</button>
  <button data-mode="energy" data-i18n="btn_energy">Energía Híbrida</button>
  <button data-mode="ar" data-i18n="btn_ar">Realidad Aumentada</button>
  <button data-mode="reset" data-i18n="btn_reset">Reiniciar</button>
</div>

<!-- Tooltip -->
<div id="tooltip"><div class="tt-title"></div><div class="tt-body"></div></div>

<!-- Overlay AR -->
<div id="ar-overlay">
  <video id="ar-video" autoplay playsinline></video>
  <canvas id="ar-canvas"></canvas>
  <button id="ar-close">✕</button>
</div>

let currentLang = 'es';
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('#lang-selector button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}
document.querySelectorAll('#lang-selector button').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

// ============================================================
// ESCENA 3D PRINCIPAL
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0D1117, 0.035);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.target.set(0, 1.5, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

// ============================================================
// ILUMINACIÓN CINEMATOGRÁFICA
// ============================================================
// Luz clave - cálida lateral
const keyLight = new THREE.DirectionalLight(0xFFF0E0, 1.8);
keyLight.position.set(5, 8, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -10;
keyLight.shadow.camera.right = 10;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Luz de relleno - fría
const fillLight = new THREE.DirectionalLight(0xB0C4DE, 0.6);
fillLight.position.set(-4, 3, -2);
scene.add(fillLight);

// Luz de borde - cian
const rimLight = new THREE.DirectionalLight(0x4FC3F7, 1.2);
rimLight.position.set(-3, 5, -6);
scene.add(rimLight);

// Luz ambiental suave
const ambLight = new THREE.AmbientLight(0x1a2332, 0.8);
scene.add(ambLight);

// Puntos de acento cian
const accentLight1 = new THREE.PointLight(0x4FC3F7, 2, 8, 2);
accentLight1.position.set(0, 3, 0);
scene.add(accentLight1);

const accentLight2 = new THREE.PointLight(0x4FC3F7, 1, 6, 2);
accentLight2.position.set(-3, 2, 2);
scene.add(accentLight2);

// Spotlight para el modelo principal
const spotLight = new THREE.SpotLight(0xFFFFFF, 1.5, 20, Math.PI / 6, 0.5, 1);
spotLight.position.set(0, 10, 0);
spotLight.target.position.set(0, 1.5, 0);
spotLight.castShadow = true;
scene.add(spotLight);
scene.add(spotLight.target);

// ============================================================
// MATERIALES
// ============================================================
const matTitanium = new THREE.MeshStandardMaterial({
  color: 0x6B7280, metalness: 0.85, roughness: 0.35
});
const matTitaniumDark = new THREE.MeshStandardMaterial({
  color: 0x4B5563, metalness: 0.9, roughness: 0.3
});
const matSilver = new THREE.MeshStandardMaterial({
  color: 0x9CA3AF, metalness: 0.7, roughness: 0.4
});
const matWhite = new THREE.MeshStandardMaterial({
  color: 0xF3F4F6, metalness: 0.1, roughness: 0.7
});
const matCyan = new THREE.MeshStandardMaterial({
  color: 0x4FC3F7, emissive: 0x4FC3F7, emissiveIntensity: 0.5,
  metalness: 0.3, roughness: 0.4
});
const matAnthracite = new THREE.MeshStandardMaterial({
  color: 0x1F2937, metalness: 0.6, roughness: 0.5
});
const matPadding = new THREE.MeshStandardMaterial({
  color: 0x2D3748, metalness: 0.0, roughness: 0.95
});

// Shader para visor holográfico
const visorShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0x4FC3F7) },
    uIntensity: { value: 0.8 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vViewDir;
    void main(){
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec4 mvPos = modelViewMatrix * vec4(position,1.0);
      vViewDir = normalize(-mvPos.xyz);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColor;
    uniform float uIntensity;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vViewDir;
    void main(){
      float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.0);
      float scanLine = sin(vUv.y * 80.0 + uTime * 3.0) * 0.5 + 0.5;
      scanLine = smoothstep(0.4, 0.6, scanLine) * 0.15;
      float hNoise = sin(vUv.x * 40.0 + uTime * 1.5) * sin(vUv.y * 30.0 - uTime * 2.0);
      hNoise = hNoise * 0.05 + 0.05;
      float alpha = fresnel * uIntensity + scanLine + hNoise;
      alpha = clamp(alpha, 0.05, 0.85);
      vec3 col = uColor * (0.7 + fresnel * 0.5);
      gl_FragColor = vec4(col, alpha);

  transparent: true, side: THREE.DoubleSide, depthWrite: false
});

// Shader para cerebro
const brainShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uBaseColor: { value: new THREE.Color(0xD4A574) },
    uActiveColor: { value: new THREE.Color(0x4FC3F7) },
    uPulseIntensity: { value: 0.6 }
  },
  vertexShader: `
    varying vec3 vPos;
    varying vec3 vNorm;
    varying vec2 vUv;
    uniform float uTime;
    void main(){
      vUv = uv;
      vNorm = normalize(normalMatrix * normal);
      vec3 p = position;
      float disp = sin(p.x * 5.0 + uTime) * sin(p.y * 4.0 + uTime * 0.7) * sin(p.z * 6.0 - uTime * 0.5) * 0.03;
      p += normal * disp;
      vPos = (modelViewMatrix * vec4(p,1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uBaseColor;
    uniform vec3 uActiveColor;
    uniform float uPulseIntensity;
    varying vec3 vPos;
    varying vec3 vNorm;
    varying vec2 vUv;
    void main(){
      float pulse = sin(vUv.y * 12.0 + uTime * 2.0) * 0.5 + 0.5;
      pulse *= sin(vUv.x * 8.0 - uTime * 1.5) * 0.5 + 0.5;
      float activity = smoothstep(0.3, 0.8, pulse) * uPulseIntensity;
      vec3 col = mix(uBaseColor, uActiveColor, activity);
      float fresnel = pow(1.0 - max(dot(vNorm, normalize(-vPos)), 0.0), 2.0);
      col += uActiveColor * fresnel * 0.3;
      gl_FragColor = vec4(col, 0.88);
    }
  `,
  transparent: true
});

let currentMode = 'default';
const modeIndicator = document.getElementById('mode-indicator');
let modeTimeout = null;

function setMode(mode) {
  // Desactivar modo anterior
  document.querySelectorAll('#controls-panel button').forEach(b => b.classList.remove('active-mode'));

  if (mode === 'reset') {
    currentMode = 'default';
    headsetGroup.visible = true;
    brainGroup.visible = true;
    aiNodesGroup.visible = true;
    dataFlowPoints.visible = true;
    bioGroup.visible = false;
    swarmPoints.visible = false;
    energyGroup.visible = false;
    mainFlowLines.forEach(l => l.visible = true);
    controls.autoRotate = true;
    controls.target.set(0, 1.5, 0);
    camera.position.set(6, 4, 8);
    showModeIndicator('');
    return;
  }

  if (mode === 'ar') {
    startAR();
    return;
  }

  currentMode = mode;
  const btn = document.querySelector(`[data-mode="${mode}"]`);
  if (btn) btn.classList.add('active-mode');

  const modeTextKey = `mode_${mode}`;
  showModeIndicator(i18n[currentLang][modeTextKey] || mode);

  // Resetear visibilidad
  headsetGroup.visible = true;
  brainGroup.visible = true;
  aiNodesGroup.visible = true;
  dataFlowPoints.visible = true;
  bioGroup.visible = false;
  swarmPoints.visible = false;
  energyGroup.visible = false;
  mainFlowLines.forEach(l => l.visible = true);
  controls.autoRotate = true;

  switch (mode) {
    case 'calibration':
      // Mostrar solo headset y sensores, pulsar electrodos
      brainGroup.visible = false;
      aiNodesGroup.visible = false;
      dataFlowPoints.visible = false;
      mainFlowLines.forEach(l => l.visible = false);
      controls.autoRotate = false;
      break;

    case 'therapy':
      // Todo visible, flujo de datos activo
      break;

    case 'analysis':
      // Enfocar en nodos IA y cerebro
      headsetGroup.visible = false;
      mainFlowLines.forEach(l => l.visible = false);
      break;

    case 'biomechanics':
      headsetGroup.visible = false;
      brainGroup.visible = false;
      aiNodesGroup.visible = false;
      dataFlowPoints.visible = false;
      mainFlowLines.forEach(l => l.visible = false);
      bioGroup.visible = true;
      controls.autoRotate = false;
      break;

    case 'swarm':
      headsetGroup.visible = false;
      brainGroup.visible = false;
      aiNodesGroup.visible = false;
      dataFlowPoints.visible = false;
      mainFlowLines.forEach(l => l.visible = false);
      swarmPoints.visible = true;
      break;

    case 'energy':
      headsetGroup.visible = false;
      brainGroup.visible = false;
      aiNodesGroup.visible = false;
      dataFlowPoints.visible = false;
      mainFlowLines.forEach(l => l.visible = false);
      energyGroup.visible = true;
      break;
  }
}

function showModeIndicator(text) {
  modeIndicator.textContent = text;
  modeIndicator.classList.toggle('visible', !!text);
  if (modeTimeout) clearTimeout(modeTimeout);
  if (text) {
    modeTimeout = setTimeout(() => modeIndicator.classList.remove('visible'), 3000);
  }
}

document.querySelectorAll('#controls-panel button').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

let arActive = false;
let arScene, arCamera, arRenderer, arAnimationId;

async function startAR() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const overlay = document.getElementById('ar-overlay');
    const video = document.getElementById('ar-video');
    const arCanvas = document.getElementById('ar-canvas');
    video.srcObject = stream;
    overlay.style.display = 'block';

    arCanvas.width = window.innerWidth;
    arCanvas.height = window.innerHeight;

    arScene = new THREE.Scene();
    arCamera = new THREE.PerspectiveCamera(50, arCanvas.width / arCanvas.height, 0.1, 100);
    arCamera.position.set(0, 2, 5);
    arCamera.lookAt(0, 2, 0);

    arRenderer = new THREE.WebGLRenderer({ canvas: arCanvas, alpha: true, antialias: true });
    arRenderer.setSize(arCanvas.width, arCanvas.height);
    arRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    arRenderer.toneMapping = THREE.ACESFilmicToneMapping;

    // Luz AR
    arScene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const arDir = new THREE.DirectionalLight(0xffffff, 1.5);
    arDir.position.set(3, 5, 4);
    arScene.add(arDir);
    const arPoint = new THREE.PointLight(0x4FC3F7, 2, 8);
    arPoint.position.set(0, 3, 0);
    arScene.add(arPoint);

    // Clonar headset para AR
    const arHeadset = headsetGroup.clone();
    arHeadset.position.set(0, 2, 0);
    arHeadset.scale.set(0.8, 0.8, 0.8);
    arScene.add(arHeadset);

    // Clonar cerebro para AR
    const arBrain = brainGroup.clone();
    arBrain.position.set(0, 4, -1);
    arBrain.scale.set(0.6, 0.6, 0.6);
    arScene.add(arBrain);

    // Plano de referencia (mesa)
    const arPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(4, 4),
      new THREE.MeshStandardMaterial({ color: 0x4FC3F7, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
    );
    arPlane.rotation.x = -Math.PI / 2;
    arPlane.position.y = 0;
    arScene.add(arPlane);

    const arGrid = new THREE.GridHelper(4, 20, 0x4FC3F7, 0x4FC3F7);
    arGrid.material.transparent = true;
    arGrid.material.opacity = 0.15;
    arScene.add(arGrid);

    // Controles AR (touch/mouse)
    let arRotY = 0;
    let arLastX = 0;
    const onPointerDown = (e) => { arLastX = e.clientX || e.touches[0].clientX; };
    const onPointerMove = (e) => {
      const x = e.clientX || (e.touches && e.touches[0].clientX) || arLastX;
      arRotY += (x - arLastX) * 0.005;
      arLastX = x;
    };
    arCanvas.addEventListener('mousedown', onPointerDown);
    arCanvas.addEventListener('mousemove', onPointerMove);
    arCanvas.addEventListener('touchstart', onPointerDown, { passive: true });
    arCanvas.addEventListener('touchmove', onPointerMove, { passive: true });

    arActive = true;
    controls.autoRotate = false;

    function arLoop() {
      if (!arActive) return;
      arAnimationId = requestAnimationFrame(arLoop);
      arHeadset.rotation.y = arRotY;
      arBrain.rotation.y = arRotY * 0.5;

      // Actualizar shaders AR
      arHeadset.traverse(child => {
        if (child.material === visorShaderMat || (child.material && child.material.uniforms && child.material.uniforms.uTime)) {
          child.material.uniforms.uTime.value = performance.now() * 0.001;
        }
      });

      arRenderer.render(arScene, arCamera);
    }
    arLoop();

  } catch (err) {
    console.warn('AR no disponible:', err);
    showModeIndicator(i18n[currentLang].btn_ar + ' - No disponible');
  }
}

function stopAR() {
  arActive = false;
  if (arAnimationId) cancelAnimationFrame(arAnimationId);
  const overlay = document.getElementById('ar-overlay');
  overlay.style.display = 'none';
  const video = document.getElementById('ar-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  controls.autoRotate = true;
}

document.getElementById('ar-close').addEventListener('click', stopAR);

// ANIMACIÓN BIOMECÁNICA
// ============================================================
function animateBiomechanics(time) {
  if (!bioGroup.visible) return;

  bioGroup.traverse(child => {
    if (child.userData && child.userData.jointName) {
      const name = child.userData.jointName;
      const orig = child.userData.origPos;
      let offset = new THREE.Vector3();

      switch (name) {
        case 'rHand':
          offset.set(Math.sin(time * 1.5) * 0.3, Math.cos(time * 1.5) * 0.2 + 0.3, Math.sin(time * 0.8) * 0.15);
          break;
        case 'rElbow':
          offset.set(Math.sin(time * 1.5) * 0.15, Math.cos(time * 1.5) * 0.1 + 0.1, 0);
          break;
        case 'lHand':
          offset.set(Math.sin(time * 1.2 + 1) * 0.2, Math.cos(time * 1.2 + 1) * 0.15 + 0.2, Math.sin(time * 0.7 + 1) * 0.1);
          break;
        case 'lElbow':
          offset.set(Math.sin(time * 1.2 + 1) * 0.1, Math.cos(time * 1.2 + 1) * 0.08, 0);
          break;
        case 'head':
          offset.set(Math.sin(time * 0.5) * 0.05, 0, 0);
          break;
        case 'rKnee':
          offset.y = Math.sin(time * 0.8) * 0.05;
          break;
        case 'lKnee':
          offset.y = Math.sin(time * 0.8 + Math.PI) * 0.05;
          break;
      }
      child.position.copy(orig).add(offset);
    }
  });

  // Actualizar huesos
  Object.values(bioBones).forEach(bone => {
    const aPos = bioGroup.children.find(c => c.userData.jointName === bone.a);
    const bPos = bioGroup.children.find(c => c.userData.jointName === bone.b);
    if (aPos && bPos) {
      const mid = aPos.position.clone().add(bPos.position).multiplyScalar(0.5);
      bone.mesh.position.copy(mid);
      const dir = bPos.position.clone().sub(aPos.position);
      const len = Math.max(0.01, dir.length());
      bone.mesh.scale.y = len / (bone.origB.clone().sub(bone.origA).length());
      bone.mesh.lookAt(bPos.position);
      bone.mesh.rotateX(Math.PI / 2);
    }
  });
}

// ============================================================
// SIMULACIÓN DE ENJAMBRE
// ============================================================
function animateSwarm(time) {
  if (!swarmPoints.visible) return;
  const pos = swarmGeom.attributes.position.array;
  const center = new THREE.Vector3(0, 3, 0);

  for (let i = 0; i < swarmCount; i++) {
    const idx = i * 3;
    const vel = swarmVelocities[i];
    const px = pos[idx], py = pos[idx + 1], pz = pos[idx + 2];
    const posVec = new THREE.Vector3(px, py, pz);

    // Reglas de enjambre simplificadas
    const toCenter = center.clone().sub(posVec).multiplyScalar(0.001);
    vel.add(toCenter);

    // Separación (muestreo parcial para rendimiento)
    if (i % 4 === 0) {
      for (let j = Math.max(0, i - 8); j < Math.min(swarmCount, i + 8); j++) {
        if (i === j) continue;
        const dx = pos[idx] - pos[j * 3];
        const dy = pos[idx + 1] - pos[j * 3 + 1];
        const dz = pos[idx + 2] - pos[j * 3 + 2];
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 0.5 && dist > 0.001) {
          vel.add(new THREE.Vector3(dx / dist, dy / dist, dz / dist).multiplyScalar(0.002));
        }
      }
    }

    // Alineación y cohesión (muestreo)
    if (i % 10 === 0) {
      const sampleIdx = Math.floor(Math.random() * swarmCount) * 3;
      const otherVel = swarmVelocities[Math.floor(sampleIdx / 3)];
      vel.add(otherVel.clone().sub(vel).multiplyScalar(0.01));
    }

    // Movimiento orbital
    const angle = Math.atan2(pz - center.z, px - center.x) + 0.005;
    const radius = Math.sqrt((px - center.x) ** 2 + (pz - center.z) ** 2);
    const targetR = 2 + Math.sin(time * 0.3 + i * 0.01) * 1;
    vel.x += (Math.cos(angle) * targetR - px + center.x) * 0.002;
    vel.z += (Math.sin(angle) * targetR - pz + center.z) * 0.002;
    vel.y += (3 + Math.sin(time * 0.5 + i * 0.02) - py) * 0.001;

    // Limitar velocidad
    const speed = vel.length();
    if (speed > 0.04) vel.multiplyScalar(0.04 / speed);

    vel.multiplyScalar(0.98); // Fricción
    pos[idx] += vel.x;
    pos[idx + 1] += vel.y;
    pos[idx + 2] += vel.z;
  }
  swarmGeom.attributes.position.needsUpdate = true;
}

// ============================================================
// BUCLE PRINCIPAL DE ANIMACIÓN
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  controls.update();

  // Actualizar shaders con tiempo
  visorShaderMat.uniforms.uTime.value = time;
  brainShaderMat.uniforms.uTime.value = time;
  dataFlowShaderMat.uniforms.uTime.value = time;
  swarmShaderMat.uniforms.uTime.value = time;
  ambMat.uniforms.uTime.value = time;

  // Actualizar shader de energía
  energyGroup.traverse(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
      child.material.uniforms.uTime.value = time;
    }
  });

  // Pulsar electrodos EEG
  eegGroup.children.forEach(child => {
    if (child.userData && child.userData.pulsePhase !== undefined) {
      const scale = 1 + Math.sin(time * 3 + child.userData.pulsePhase) * 0.3;
      child.scale.setScalar(scale);
      child.material.opacity = 0.3 + Math.sin(time * 3 + child.userData.pulsePhase) * 0.3;
    }
  });

  // Pulsar nodos de sinapsis en cerebro
  brainGroup.children.forEach(child => {
    if (child.userData && child.userData.pulsePhase !== undefined) {
      const s = 1 + Math.sin(time * 4 + child.userData.pulsePhase) * 0.5;
      child.scale.setScalar(s);
    }
    // Animar rutas neurales
    if (child.userData && child.userData.pathCurve) {
      child.material.opacity = 0.15 + Math.sin(time * child.userData.speed + child.userData.phase) * 0.2;
    }
  });

  // Rotar cerebro lentamente
  brainGroup.rotation.y = Math.sin(time * 0.2) * 0.3;

  // Pulsar nodos IA
  nodeMeshes.forEach((nm, i) => {
    const s = 1 + Math.sin(time * 2 + nm.userData.phase) * 0.15;
    nm.scale.setScalar(s);
    if (nm.material.emissiveIntensity !== undefined) {
      nm.material.emissiveIntensity = 0.3 + Math.sin(time * 2 + nm.userData.phase) * 0.3;
    }
  });

  // Animar flujo de datos
  if (dataFlowPoints.visible && nodeConnections.length > 0) {
    const dfPos = dfGeom.attributes.position.array;
    const paths = dataFlowPoints.userData.paths;
    for (let i = 0; i < dataFlowCount; i++) {
      const p = paths[i];
      p.t += p.speed * 0.005;
      if (p.t > 1) p.t -= 1;
      const conn = nodeConnections[p.connIdx];
      if (conn) {
        const from = new THREE.Vector3(...nodeData[conn.from].pos);
        const to = new THREE.Vector3(...nodeData[conn.to].pos);
        const pos = from.clone().lerp(to, p.t);
        // Añadir algo de variación
        pos.x += Math.sin(time * 2 + i) * 0.05;
        pos.y += Math.cos(time * 1.5 + i * 0.5) * 0.05;
        dfPos[i * 3] = pos.x;
        dfPos[i * 3 + 1] = pos.y;
        dfPos[i * 3 + 2] = pos.z;
      }
    }
    dfGeom.attributes.position.needsUpdate = true;
  }

  // Pulsar líneas de flujo principal
  mainFlowLines.forEach((line, i) => {
    line.material.opacity = 0.2 + Math.sin(time * 3 + i * 0.8) * 0.2;
  });

  // Animar LEDs del headset
  headsetGroup.children.forEach(child => {
    if (child.userData && child.userData.ledPhase !== undefined) {
      child.material.opacity = 0.5 + Math.sin(time * 4 + child.userData.ledPhase) * 0.5;
    }
  });

  // Animar energía
  if (energyGroup.visible) {
    energyCore.rotation.y = time * 0.5;
    energyCore.rotation.x = time * 0.3;
    const coreScale = 1 + Math.sin(time * 2) * 0.15;
    energyCore.scale.setScalar(coreScale);

    energyGroup.children.forEach(child => {
      if (child.userData && child.userData.rotSpeed) {
        if (child.userData.axis === 0) child.rotation.z += child.userData.rotSpeed * 0.01;
        else if (child.userData.axis === 1) child.rotation.x += child.userData.rotSpeed * 0.01;
        else child.rotation.y += child.userData.rotSpeed * 0.01;
      }
    });

    // Rotar partículas de energía
    const epPos = epGeom.attributes.position.array;
    for (let i = 0; i < energyPartCount; i++) {
      const angle = epPhases[i] + time * epSpeeds[i] * 0.3;
      const r = 1.2 + (i / energyPartCount) * 2;
      epPos[i * 3] = Math.cos(angle) * r;
      epPos[i * 3 + 2] = Math.sin(angle) * r;
      epPos[i * 3 + 1] = 2.5 + Math.sin(time * epSpeeds[i] + i) * 0.8;
    }
    epGeom.attributes.position.needsUpdate = true;
  }

  // Luces de acento pulsantes
  accentLight1.intensity = 1.5 + Math.sin(time * 1.5) * 0.5;
  accentLight2.intensity = 0.8 + Math.sin(time * 2 + 1) * 0.3;

  // Simulaciones
  animateBiomechanics(time);
  animateSwarm(time);
  updateHUD(time);

  renderer.render(scene, camera);
}

// ============================================================
// REDIMENSIONAR VENTANA
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (arActive) {
    const arCanvas = document.getElementById('ar-canvas');
    arCanvas.width = window.innerWidth;
    arCanvas.height = window.innerHeight;
    if (arRenderer) arRenderer.setSize(arCanvas.width, arCanvas.height);
    if (arCamera) {
      arCamera.aspect = arCanvas.width / arCanvas.height;
      arCamera.updateProjectionMatrix();
    }
  }
});

// ============================================================
// INICIALIZAR
// ============================================================
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 1500);

animate();
</script>
